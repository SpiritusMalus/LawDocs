id: auto_repair
category: consumer
title: "Автосервис плохо отремонтировал"
blurb: "Автосервис выполнил ремонт некачественно или затянул сроки — требуем устранения или возврата денег."
examples: "Брак в ремонте, повторная поломка, нарушение сроков, завышенная стоимость"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: service_name
  - field: service_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по защите прав потребителей. Составь претензию в автосервис.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
