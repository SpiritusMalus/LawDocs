id: telecom
category: consumer
title: "Интернет или телефон не работает"
blurb: "Провайдер не оказывает услуги по договору, списывает деньги незаконно или отключает без причины."
examples: "Скорость ниже заявленной, перебои в работе, незаконные списания, навязали платные опции"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по защите прав потребителей в сфере телекоммуникаций. Составь претензию оператору связи или интернет-провайдеру.

  Структура документа:
  1. Шапка: «[provider_name], [provider_address]» / «От: [full_name], [contact_address], [phone], [email]»
  2. Заголовок: ПРЕТЕНЗИЯ о ненадлежащем оказании услуг связи
  3. Описание договора:
     — «между мной и [provider_name] заключён договор об оказании услуг связи № contract_number (если указан)»
     — тип услуги: service_type
  4. Описание нарушения с датой (problem_start_date) и существом (problem_desc).
     Если complaint_date и provider_response заполнены — указать, что провайдер уведомлён, и его ответ.
  5. Правовое обоснование:
     — ФЗ «О связи» ст. 44: оператор обязан оказывать услуги в соответствии с договором и лицензией
     — ФЗ «О связи» ст. 55: абонент вправе предъявлять претензии; срок рассмотрения — 30 дней (для голоса) или 60 дней
     — ЗоЗПП ст. 4: исполнитель обязан оказывать услугу надлежащего качества
     — ЗоЗПП ст. 29: при оказании услуги ненадлежащего качества потребитель вправе требовать соразмерного снижения цены, устранения недостатков, возврата уплаченных средств
     — ЗоЗПП ст. 16: условия договора, ущемляющие права потребителя (навязанные платные услуги), ничтожны
     — Если problem_type = "illegal_charges": дополнить ст. 54 ФЗ «О связи» — оператор не вправе взимать плату за услуги, не предусмотренные договором
  6. Если monthly_fee указан и problem_type = "no_service" или "slow_speed":
     Рассчитать требование к возврату пропорционально периоду (monthly_fee / 30 × количество_дней_с_problem_start_date).
  7. Требование: конкретное (согласно demand), срок 10 дней.
  8. При неисполнении — жалоба в Роскомнадзор + иск в суд + штраф 50% (ст. 13 ЗоЗПП).
  9. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: тип услуги, суть нарушения и с какой даты оно продолжается.
  Если провайдер получил обращение и дал ответ — отрази это.
  Используй только данные из формы.

wizard_steps:
  - title: "Провайдер и договор"
    fields:
      - id: provider_name
        type: text
        label: "Название провайдера"
        placeholder: "Ростелеком, МТС, Билайн, Дом.ру…"
        required: true
      - id: provider_address
        type: text
        label: "Адрес офиса или юридический адрес"
        placeholder: "Найдите в договоре или на сайте провайдера в разделе «Контакты»"
      - id: contract_number
        type: text
        label: "Номер договора / лицевого счёта"
        placeholder: "№ 1234567890"
      - id: service_type
        type: radio
        label: "Тип услуги"
        required: true
        options:
          - value: internet
            label: "Домашний интернет"
          - value: mobile
            label: "Мобильная связь"
          - value: tv
            label: "Кабельное или спутниковое ТВ"
          - value: bundle
            label: "Пакет услуг (интернет + ТВ + телефон)"
  - title: "Суть проблемы"
    fields:
      - id: problem_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: no_service
            label: "Услуга полностью не работает"
          - value: slow_speed
            label: "Скорость ниже заявленной по договору"
          - value: illegal_charges
            label: "Незаконно списали деньги или подключили платные услуги"
          - value: disconnected
            label: "Отключили без предупреждения и законного основания"
          - value: other
            label: "Другое нарушение"
      - id: problem_start_date
        type: date
        label: "С какой даты проблема"
        required: true
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Интернет не работает с 10 мая, скорость 2 Мбит при тарифе 100 Мбит, списали 890 руб. за опцию «Семейный контент»…"
        required: true
      - id: complaint_date
        type: date
        label: "Когда обращались в поддержку"
      - id: provider_response
        type: textarea
        label: "Что ответил провайдер"
        placeholder: "Сказали «идут технические работы», отказали в перерасчёте…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: fix
            label: "Устранить неисправность и восстановить услугу"
          - value: refund
            label: "Вернуть деньги за период отсутствия услуги"
          - value: cancel_charges
            label: "Отменить незаконные списания и вернуть деньги"
          - value: terminate
            label: "Расторгнуть договор без штрафа и вернуть остаток"
      - id: monthly_fee
        type: number
        label: "Ежемесячный платёж по тарифу, ₽"
        placeholder: "890"
        hint: "Нужно для расчёта суммы возврата"

legal_refs:
  - law: "ФЗ «О связи» — права абонента и обязанности оператора"
    url: "https://www.consultant.ru/document/cons_doc_LAW_43224/"
  - law: "Закон о защите прав потребителей ст. 29"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
