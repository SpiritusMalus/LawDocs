id: court_order
category: legal
title: "Отменить судебный приказ"
blurb: "Мировой суд вынес приказ о взыскании долга без вашего участия — есть 10 дней, чтобы его отменить."
examples: "Взыскание банком, МФО, коллектором, ЖКХ, налоговой; отмена через возражение"
document_type: vozrazhenie
template_file: null

header_fields:
  - label: "Мировому судье"
    field: court_name
  - label: "От должника:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# 0 LLM-вызовов — содержимое чистый текст по objection_reason.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM не используется.

python_template: |
  [calculated_intro_section]

  [calculated_receipt_section]

  [calculated_legal_section]

  [calculated_objection_section]

  [calculated_additional_block]

  [calculated_demand_section]

narrative_prompt: |
  Этот конфиг не использует LLM-перефразировку.

narrative_fields: []

wizard_steps:
  - title: "Суд и приказ"
    fields:
      - id: court_name
        type: text
        label: "Мировой суд (название или номер участка)"
        placeholder: "Судебный участок №5 Пресненского района г. Москвы"
        required: true
      - id: case_number
        type: text
        label: "Номер дела / судебного приказа"
        placeholder: "2-1234/2025"
        required: true
      - id: order_date
        type: date
        label: "Дата вынесения приказа"
        hint: "Указана в тексте приказа"
      - id: receive_date
        type: date
        label: "Дата получения приказа вами"
        required: true
        hint: "Срок возражения — 10 дней с этой даты. Действуйте быстро!"
  - title: "Взыскатель и сумма"
    fields:
      - id: creditor_name
        type: text
        label: "Кто взыскивает (взыскатель)"
        placeholder: "ПАО Сбербанк, ООО «МФК Займ Плюс»"
        required: true
      - id: creditor_type
        type: radio
        label: "Тип взыскателя"
        required: true
        options:
          - value: bank
            label: "Банк"
          - value: mfo
            label: "МФО / коллектор"
          - value: housing
            label: "ЖКХ / управляющая компания"
          - value: tax
            label: "ФНС / налоговая"
          - value: other
            label: "Другое"
      - id: debt_amount
        type: number
        label: "Сумма по приказу, ₽"
        placeholder: "85000"
        required: true
  - title: "Ваши возражения"
    fields:
      - id: objection_reason
        type: radio
        label: "Основание возражения"
        required: true
        options:
          - value: dispute_debt
            label: "Оспариваем сам долг (ничего не должны)"
          - value: dispute_amount
            label: "Оспариваем сумму (завышена, ошибка в расчёте)"
          - value: already_paid
            label: "Долг уже оплачен (полностью или частично)"
          - value: procedural
            label: "Нарушения при выдаче приказа / истёк срок давности"
          - value: other
            label: "Другое"
      - id: additional_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Что важно знать суду: внесённые платежи, срок давности, ошибки в расчёте"

legal_refs:
  - law: "ГПК РФ ст. 128-129 — возражение на судебный приказ и его отмена"
    url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  - law: "ГПК РФ ст. 121-127 — порядок выдачи судебного приказа"
    url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  - law: "ФЗ-229 «Об исполнительном производстве» ст. 43, 45 — прекращение ИП после отмены приказа"
    url: "https://www.consultant.ru/document/cons_doc_LAW_71450/"

legal_refs_by_branch:
  creditor_type:bank:
    - law: "ФЗ-353 «О потребительском кредите» ст. 14 — уступка требований банком"
      url: "https://www.consultant.ru/document/cons_doc_LAW_155986/"
    - law: "ФЗ-102 «Об ипотеке» ст. 51 — взыскание по ипотечным требованиям через суд"
      url: "https://www.consultant.ru/document/cons_doc_LAW_18985/"
  creditor_type:mfo:
    - law: "ФЗ-151 «О микрофинансовой деятельности» ст. 12 — ограничения на начисление процентов"
      url: "https://www.consultant.ru/document/cons_doc_LAW_112267/"
    - law: "ФЗ-353 ст. 6 — максимальная полная стоимость кредита (ограничение ростовщических процентов)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_155986/"
  creditor_type:housing:
    - law: "ЖК РФ ст. 155 — сроки и порядок оплаты жилья и коммунальных услуг"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
    - law: "ЖК РФ ст. 153 — обязанность по внесению платы за жилое помещение"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
  creditor_type:tax:
    - law: "НК РФ ст. 48 — взыскание налога с физических лиц в судебном порядке"
      url: "https://www.consultant.ru/document/cons_doc_LAW_19671/"
    - law: "НК РФ ст. 70 — сроки направления требования об уплате налога"
      url: "https://www.consultant.ru/document/cons_doc_LAW_19671/"
  creditor_type:other:
    - law: "ГПК РФ ст. 122 — требования, по которым выдаётся судебный приказ"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  objection_reason:dispute_debt:
    - law: "ГПК РФ ст. 129 — отмена судебного приказа при несогласии должника с требованиями"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  objection_reason:dispute_amount:
    - law: "ГПК РФ ст. 129 — возражение относительно размера взысканной суммы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
    - law: "ГК РФ ст. 333 — снижение неустойки судом при явной несоразмерности"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  objection_reason:already_paid:
    - law: "ГПК РФ ст. 129 — исполнение обязательства как основание для отмены приказа"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
    - law: "ФЗ-229 ст. 43 ч. 1 п. 1 — прекращение исполнительного производства при погашении долга"
      url: "https://www.consultant.ru/document/cons_doc_LAW_71450/"
  objection_reason:procedural:
    - law: "ГПК РФ ст. 124 — требования к заявлению о выдаче судебного приказа"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
    - law: "ГПК РФ ст. 196 — срок исковой давности как процессуальное возражение"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  objection_reason:other:
    - law: "ГПК РФ ст. 128-129 — право должника подать возражение в течение 10 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
