id: dtp_osago
category: transport
title: "Страховая не платит по ОСАГО"
blurb: "После ДТП страховая затягивает выплату или занизила сумму возмещения."
examples: "Просрочка выплаты по ОСАГО, занижение ущерба, отказ в выплате"
document_type: pretenziya
template_file: null

header_fields:
  - field: insurance_company
  - field: insurance_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по автострахованию. Составь досудебную претензию в страховую компанию о выплате страхового возмещения по ОСАГО.

  Обстоятельства ДТП: дата (incident_date), место (incident_location), ТС пострадавшего (car_model + car_plate), полис ОСАГО виновника (policy_number если указан).
  Соблюдение досудебного порядка: указать, что документы на выплату поданы claim_date, страховая обязана была выплатить в течение 20 рабочих дней (ст. 12 ч. 21 ФЗ-40).
  Нарушение:
     — Если violation_type = "delay": «По состоянию на дату составления настоящей претензии выплата не произведена / произведена с нарушением срока.»
     — Если violation_type = "underestimate" или "занижение страховой выплаты": страховая выплатила [paid_amount] руб., тогда как реальный ущерб по независимой экспертизе составляет [damage_amount] руб. Недоплата: [underpayment_amount] руб.
     — Если violation_type = "refusal": «Страховая компания отказала в выплате, сославшись на основание из формы. Отказ является незаконным, поскольку страховой случай наступил.»
  Расчёт неустойки (ст. 16.1 ч. 21 ФЗ-40): если указаны overdue_days — 1% × [underpayment_amount] × [overdue_days] дн. = [penalty_amount] руб. Если поля не указаны — пункт 6 не включай.
  Требование (ст. 16.1 ФЗ-40):
     а) Доплатить страховое возмещение в размере [underpayment_amount] руб.;
     б) Выплатить неустойку в размере [penalty_amount] руб. (если рассчитана).
     Срок исполнения: 10 календарных дней с даты получения.
  Предупреждение: при неудовлетворении — обращение к финансовому уполномоченному (ФЗ-123), далее в суд. Будет взыскан штраф 50% (ст. 16.1 ч. 3 ФЗ-40 + ЗоЗПП ст. 13), компенсация морального вреда, судебные расходы.
  Приложения: заявление о страховом возмещении (дата claim_date), документы о ДТП, результаты экспертизы (если есть).

  ВАЖНО: не употребляй фраз «я думаю», «возможно», «по всей видимости». Документ — конкретный юридический акт.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}

ai_narrative_prompt: |
  Опиши на юридическом языке: дату и место ДТП, ТС пользователя, номер полиса виновника (если известен), дату подачи документов в страховую.
  Укажи суть нарушения: просрочка выплаты, занижение суммы или отказ.
  Если есть данные о независимой экспертизе — упомяни.
  Используй только данные из формы.

wizard_steps:
  - title: "Страховая компания"
    fields:
      - id: insurance_company
        type: text
        label: "Название страховой компании"
        placeholder: "СОГАЗ, Росгосстрах, Альфастрахование…"
        required: true
      - id: insurance_address
        type: text
        label: "Адрес страховой (отделение или юридический)"
        placeholder: "г. Москва, ул. Садовая, д. 5"
      - id: policy_number
        type: text
        label: "Номер полиса ОСАГО виновника"
        placeholder: "ААА 1234567890"
        hint: "Указан в справке о ДТП или европротоколе"
  - title: "ДТП и ущерб"
    fields:
      - id: incident_date
        type: date
        label: "Дата ДТП"
        required: true
      - id: incident_location
        type: text
        label: "Место ДТП"
        placeholder: "г. Москва, ул. Ленина, д. 10"
        required: true
      - id: car_model
        type: text
        label: "Ваш автомобиль (марка, модель)"
        placeholder: "Toyota Camry 2020"
        required: true
      - id: car_plate
        type: text
        label: "Гос. номер вашего ТС"
        placeholder: "А123ВС 77"
      - id: damage_amount
        type: number
        label: "Размер ущерба по экспертизе / заявленный, ₽"
        placeholder: "150000"
        required: true
        hint: "Укажите сумму из заключения независимого оценщика или вашу оценку"
  - title: "Что сделала страховая"
    fields:
      - id: claim_date
        type: date
        label: "Дата подачи документов в страховую"
        required: true
        hint: "20 рабочих дней от этой даты — крайний срок выплаты"
      - id: violation_type
        type: radio
        label: "Нарушение страховой"
        required: true
        options:
          - value: delay
            label: "Выплату задержали (нет денег или затягивают)"
          - value: underestimate
            label: "Заплатили меньше реального ущерба"
          - value: refusal
            label: "Отказали в выплате"
      - id: paid_amount
        type: number
        label: "Сколько уже выплатили, ₽"
        placeholder: "0"
        hint: "Если не платили вообще — оставьте 0"
      - id: refusal_reason
        type: textarea
        label: "Основание отказа (если отказали)"
        placeholder: "Страховая сослалась на…"

legal_refs:
  - law: "ФЗ-40 «Об ОСАГО» ст. 12, 16.1"
    url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
  - law: "ФЗ-123 «О финансовом уполномоченном» — обязателен до суда"
    url: "https://www.consultant.ru/document/cons_doc_LAW_302456/"
  - law: "ЗоЗПП ст. 13 — штраф 50%"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
