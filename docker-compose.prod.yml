services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawdocs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lawdocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawdocs"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - lawdocs_documents:/var/lawdocs/documents
      # CA-сертификат Минцифры для TLS-верификации GigaChat (read-only).
      # Путь внутри = путь на хосте, чтобы GIGACHAT_CA_CERT в .env не менять.
      - /opt/lawdocs/certs:/opt/lawdocs/certs:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: ./frontend/.env.local
    environment:
      BACKEND_URL: http://backend:8000
      APP_ENV: production
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawdocs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lawdocs
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - lawdocs_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "echo '0 2 * * * POSTGRES_USER=lawdocs POSTGRES_DB=lawdocs PGPASSWORD=$$POSTGRES_PASSWORD PGHOST=postgres sh /backup.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f -l 6"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - default

volumes:
  postgres_data:
  lawdocs_documents:
  lawdocs_backups:
