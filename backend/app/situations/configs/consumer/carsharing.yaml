id: carsharing
category: consumer
title: "Каршеринг предъявил необоснованный ущерб"
blurb: "Каршеринговая компания списала деньги за повреждения, которых вы не наносили, или завысила стоимость."
examples: "Яндекс.Драйв, BelkaCar, YouDrive, Delimobil — необоснованный ущерб, лишнее списание"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по защите прав потребителей. Составь претензию каршеринговой компании по поводу необоснованного взыскания ущерба или неправомерного списания денег.

  Структура документа:
  1. Шапка: «[company_name], [company_address]» / «От: [full_name], [contact_address], тел. [phone], [email]»
  2. Заголовок: ПРЕТЕНЗИЯ о возврате необоснованно удержанных денежных средств
  3. Обстоятельства: дата поездки (trip_date), маршрут/место начала (trip_location), номер авто (car_plate если указан), номер заказа (order_id если указан).
  4. Описание ситуации по violation_type:
     — Если "preexisting_damage": каршеринг предъявил ущерб за повреждения, которые существовали до начала поездки. Ссылка: согласно ст. 620 ГК РФ арендодатель несёт ответственность за недостатки имущества, существовавшие до передачи его арендатору. Пользователь обязан платить только за ущерб, причинённый по его вине (ст. 401 ГК РФ).
     — Если "overcharge": выставленная сумма (claimed_amount руб.) несоразмерна реальному ущербу. Порядок расчёта ущерба должен соответствовать рыночным ценам на ремонт (ст. 15 ГК РФ).
     — Если "unauthorized_charge": списание произошло без уведомления и надлежащего обоснования. По ЗоЗПП ст. 10 потребитель вправе получить полную информацию об услуге и её стоимости.
     — Если "other": описать из incident_desc.
  5. Правовое обоснование:
     — ЗоЗПП ст. 14: исполнитель несёт ответственность за вред, причинённый вследствие недостатков услуги (неисправный автомобиль, отсутствие фиксации повреждений при выдаче).
     — ГК РФ ст. 401: ответственность только при наличии вины.
     — ГК РФ ст. 620: арендодатель отвечает за недостатки, существовавшие до передачи имущества арендатору.
     — ЗоЗПП ст. 10, 12: право на полную и достоверную информацию об условиях услуги.
  6. Если has_photo = "yes": «Факт отсутствия повреждений / их наличия до начала поездки подтверждён фотофиксацией из приложения / собственными фотографиями.»
  7. Требование:
     — вернуть списанную сумму claimed_amount руб. в течение 10 дней;
     — предоставить документальное подтверждение причин и расчёта ущерба.
  8. При отказе — обращение в Роспотребнадзор и суд. Штраф 50% (ст. 13 ЗоЗПП), моральный вред, судебные расходы.
  9. Дата и подпись.

ai_narrative_prompt: |
  Опиши на юридическом языке: дату поездки, что именно произошло, какую сумму компания потребовала и почему пользователь с этим не согласен.
  Если есть фотодоказательства — упомяни.
  Опирайся только на данные из формы.

wizard_steps:
  - title: "Каршеринг и поездка"
    fields:
      - id: company_name
        type: text
        label: "Каршеринговая компания"
        placeholder: "Яндекс.Драйв, BelkaCar, YouDrive, Делимобиль"
        required: true
      - id: company_address
        type: text
        label: "Юридический адрес компании"
        placeholder: "Найдите в пользовательском соглашении или на сайте"
      - id: trip_date
        type: date
        label: "Дата поездки"
        required: true
      - id: trip_location
        type: text
        label: "Место начала поездки"
        placeholder: "ул. Тверская, Москва"
      - id: car_plate
        type: text
        label: "Гос. номер автомобиля (если помните)"
        placeholder: "А123ВС 77"
      - id: order_id
        type: text
        label: "Номер заказа/поездки в приложении"
        placeholder: "TRP-12345678"
  - title: "Что произошло"
    fields:
      - id: violation_type
        type: radio
        label: "Суть претензии к каршерингу"
        required: true
        options:
          - value: preexisting_damage
            label: "Предъявили ущерб за повреждения, которые были до меня"
          - value: overcharge
            label: "Завысили стоимость ущерба"
          - value: unauthorized_charge
            label: "Списали деньги без объяснений"
          - value: other
            label: "Другое"
      - id: incident_desc
        type: textarea
        label: "Опишите ситуацию подробно"
        placeholder: "При возврате авто компания сообщила о царапине на бампере, которую я не наносил. До поездки в приложении не было фото этой части…"
        required: true
      - id: claimed_amount
        type: number
        label: "Сумма, которую каршеринг требует или уже списал, ₽"
        placeholder: "25000"
        required: true
  - title: "Доказательства"
    fields:
      - id: has_photo
        type: radio
        label: "Есть ли фотодоказательства (фото до/после поездки, скрины из приложения)"
        required: true
        options:
          - value: "yes"
            label: "Да, есть фото или скриншоты"
          - value: "no"
            label: "Нет, только мои слова"
      - id: photo_desc
        type: textarea
        label: "Опишите, что зафиксировано на фото (если есть)"
        placeholder: "Скрин из приложения при начале поездки — повреждений нет. Фото авто сразу после возврата."

legal_refs:
  - law: "ГК РФ ст. 401 — ответственность только при вине"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 620 — ответственность арендодателя за скрытые недостатки"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ЗоЗПП ст. 10, 13, 14 — права потребителя услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
