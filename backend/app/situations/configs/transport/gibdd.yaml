id: gibdd
category: transport
title: "Оспорить штраф ГИБДД"
blurb: "Вынесли постановление о штрафе, с которым вы не согласны — есть 10 дней на жалобу."
examples: "Камера зафиксировала чужое нарушение, за рулём был другой человек, ошибка в постановлении"
document_type: zhaloba
template_file: null

system_prompt: |
  Ты — юрист по административному праву. Составь жалобу на постановление по делу об административном правонарушении (штраф ГИБДД).

  Структура документа:
  1. Шапка:
     — Если appeal_to = gibdd_chief: «Начальнику [gibdd_unit]» (если gibdd_unit не указан — «Начальнику ГИБДД [место нарушения]»)
     — Если appeal_to = court: «В районный (мировой) суд по месту совершения нарушения» (г./р-н из violation_place)
     «От: [ФИО], [адрес], [телефон], [email]»
  2. Заголовок: ЖАЛОБА на постановление по делу об административном правонарушении
  3. Реквизиты постановления: №fine_number (если указан), дата нарушения violation_date, место violation_place, транспортное средство vehicle, статья КоАП violation_article (если указана), сумма штрафа amount руб.
  4. Правовое обоснование права на обжалование:
     — КоАП РФ ст. 30.1: постановление по делу об административном правонарушении может быть обжаловано вышестоящему должностному лицу либо в суд
     — КоАП РФ ст. 30.3: жалоба подаётся в течение 10 суток со дня вручения или получения копии постановления
     — КоАП РФ ст. 30.2: жалоба подаётся судье/должностному лицу, вынесшему постановление, либо непосредственно в вышестоящую инстанцию
  5. Содержательная часть — описание нарушений из problem_desc
  6. Правовое основание в зависимости от objection_reason:
     — not_driving: КоАП РФ ст. 2.6.1 ч. 2 — собственник ТС освобождается от ответственности, если докажет, что в момент фиксации нарушения ТС находилось в пользовании другого лица (приложить подтверждающие документы: доверенность, договор аренды, заявление об угоне)
     — no_violation: КоАП РФ ст. 24.5 п. 1 — отсутствие события административного правонарушения; ст. 1.5 — все неустранимые сомнения трактуются в пользу лица, привлекаемого к ответственности
     — camera_error: КоАП РФ ст. 26.8 — показания специальных технических средств оцениваются в совокупности с другими доказательствами; ст. 26.11 — неустранимые сомнения в пользу привлекаемого лица; погрешность радара/камеры должна быть подтверждена сертификатом
     — procedural: КоАП РФ ст. 28.2 — нарушения при составлении протокола являются существенными; ст. 4.5 — истечение срока давности привлечения к ответственности (2 месяца / 3 месяца для суда)
     — other: КоАП РФ ст. 24.1 — задача производства: всестороннее, полное, объективное выяснение обстоятельств дела
  7. Если указаны additional_desc — добавь абзац с этой информацией
  8. Требование: отменить постановление №fine_number, производство по делу прекратить на основании КоАП РФ ст. 24.5
  9. Приложения: копия постановления, копия документов на ТС (СТС/ПТС), доказательства (фото, видео, показания свидетелей)
  10. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: когда и где произошло нарушение согласно постановлению, какое ТС, какая статья КоАП, какой размер штрафа.
  Чётко изложи, почему постановление незаконно или необоснованно, исходя из указанного основания обжалования.
  Используй только данные из формы.

wizard_steps:
  - title: "Постановление"
    fields:
      - id: fine_number
        type: text
        label: "Номер постановления"
        placeholder: "18810177240512345678"
        hint: "Указан на квитанции или в письме"
      - id: violation_date
        type: date
        label: "Дата нарушения по постановлению"
        required: true
      - id: violation_place
        type: text
        label: "Место нарушения"
        placeholder: "г. Москва, ул. Тверская, 1"
        required: true
      - id: vehicle
        type: text
        label: "Транспортное средство / гос. номер"
        placeholder: "Toyota Camry, А123БВ 777"
        required: true
      - id: violation_article
        type: text
        label: "Статья КоАП (если указана в постановлении)"
        placeholder: "ч. 2 ст. 12.9 КоАП РФ"
      - id: amount
        type: number
        label: "Сумма штрафа, ₽"
        placeholder: "3000"
        required: true
  - title: "Почему не согласны"
    fields:
      - id: objection_reason
        type: radio
        label: "Основание жалобы"
        required: true
        options:
          - value: not_driving
            label: "За рулём был другой человек"
          - value: no_violation
            label: "Нарушения не было"
          - value: camera_error
            label: "Ошибка камеры или радара"
          - value: procedural
            label: "Нарушен порядок оформления / истёк срок давности"
          - value: other
            label: "Другое основание"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что произошло, почему считаете постановление незаконным"
        required: true
      - id: additional_desc
        type: textarea
        label: "Доказательства и обстоятельства"
        placeholder: "Свидетели, видеозапись, другие доказательства"
  - title: "Куда подаём жалобу"
    fields:
      - id: appeal_to
        type: radio
        label: "Куда направить жалобу"
        required: true
        options:
          - value: gibdd_chief
            label: "Начальнику ГИБДД (вышестоящему должностному лицу)"
          - value: court
            label: "В суд (районный или мировой)"
      - id: gibdd_unit
        type: text
        label: "Подразделение ГИБДД (для жалобы начальнику)"
        placeholder: "ГИБДД УМВД России по г. Москве"
        hint: "Заполните, если жалоба идёт начальнику ГИБДД"

legal_refs:
  - law: "КоАП РФ ст. 30.1–30.3 — право и порядок обжалования постановления"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
  - law: "КоАП РФ ст. 2.6.1 — ответственность владельцев ТС"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
  - law: "КоАП РФ ст. 24.5 — обстоятельства, исключающие производство"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
