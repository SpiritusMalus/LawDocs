id: carsharing
category: consumer
title: "Каршеринг предъявил необоснованный ущерб"
blurb: "Каршеринговая компания списала деньги за повреждения, которых вы не наносили, или завысила стоимость."
examples: "Яндекс.Драйв, BelkaCar, YouDrive, Delimobil — необоснованный ущерб, лишнее списание"
document_type: pretenziya
template_file: null

header_fields:
  - field: company_name
  - field: company_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из incident_desc + photo_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

  _________________ / _________________

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  официально-деловым стилем: дата поездки, что произошло, какую сумму требует каршеринг
  и почему пользователь с этим не согласен. Если есть фотодоказательства — упомяни.
  Исправь ошибки. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - incident_desc
  - photo_desc

wizard_steps:
  - title: "Каршеринг и поездка"
    fields:
      - id: company_name
        type: text
        label: "Каршеринговая компания"
        placeholder: "Яндекс.Драйв, BelkaCar, YouDrive, Делимобиль"
        required: true
      - id: company_address
        type: text
        label: "Юридический адрес компании"
        placeholder: "Найдите в пользовательском соглашении или на сайте"
      - id: trip_date
        type: date
        label: "Дата поездки"
        required: true
      - id: trip_location
        type: text
        label: "Место начала поездки"
        placeholder: "ул. Тверская, Москва"
      - id: car_plate
        type: text
        label: "Гос. номер автомобиля (если помните)"
        placeholder: "А123ВС 77"
      - id: order_id
        type: text
        label: "Номер заказа/поездки в приложении"
        placeholder: "TRP-12345678"
  - title: "Что произошло"
    fields:
      - id: violation_type
        type: radio
        label: "Суть претензии к каршерингу"
        required: true
        options:
          - value: preexisting_damage
            label: "Предъявили ущерб за повреждения, которые были до меня"
          - value: overcharge
            label: "Завысили стоимость ущерба"
          - value: unauthorized_charge
            label: "Списали деньги без объяснений"
          - value: other
            label: "Другое"
      - id: incident_desc
        type: textarea
        label: "Опишите ситуацию подробно"
        placeholder: "При возврате авто компания сообщила о царапине на бампере, которую я не наносил. До поездки в приложении не было фото этой части…"
        required: true
      - id: claimed_amount
        type: number
        label: "Сумма, которую каршеринг требует или уже списал, ₽"
        placeholder: "25000"
        required: true
  - title: "Доказательства"
    fields:
      - id: has_photo
        type: radio
        label: "Есть ли фотодоказательства (фото до/после поездки, скрины из приложения)"
        required: true
        options:
          - value: "yes"
            label: "Да, есть фото или скриншоты"
          - value: "no"
            label: "Нет, только мои слова"
      - id: photo_desc
        type: textarea
        label: "Опишите, что зафиксировано на фото (если есть)"
        placeholder: "Скрин из приложения при начале поездки — повреждений нет. Фото авто сразу после возврата."

legal_refs:
  - law: "ГК РФ ст. 401 — ответственность только при вине"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 620 — ответственность арендодателя за скрытые недостатки"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ЗоЗПП ст. 10, 13, 14 — права потребителя услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
