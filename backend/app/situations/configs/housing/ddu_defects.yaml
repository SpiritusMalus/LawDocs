id: ddu_defects
category: housing
title: "Застройщик сдал квартиру с недостатками"
blurb: "Приняли квартиру, а потом обнаружили строительный брак: трещины, кривые стены, протечки."
examples: "Строительный брак, щели в окнах, промерзание стен, протечки, кривая стяжка"
document_type: pretenziya
template_file: null

header_fields:
  - field: developer_name
  - field: developer_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из defects_desc + problem_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (4–6 предложений) опиши строительные недостатки квартиры
  официально-деловым стилем: перечисли выявленные дефекты нумерованным списком, каждый пункт
  отдельной строкой. Исправь орфографические и грамматические ошибки. Сохрани все детали.
  Верни ТОЛЬКО текст абзаца со списком, без вступлений и пояснений.

narrative_fields:
  - defects_desc
  - problem_desc

wizard_steps:
  - title: "Застройщик"
    fields:
      - id: developer_name
        type: text
        label: "Наименование застройщика"
        placeholder: "ООО «СтройГрупп»"
        required: true
      - id: developer_address
        type: text
        label: "Юридический адрес застройщика"
        placeholder: "г. Москва, ул. Строителей, д. 1"
        hint: "Найдите в ДДУ или на сайте застройщика"
  - title: "Договор и квартира"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес квартиры"
        placeholder: "г. Москва, ул. Новая, д. 15, кв. 42"
        required: true
      - id: contract_number
        type: text
        label: "Номер ДДУ"
        placeholder: "№ 123/2022-ДДУ"
        required: true
      - id: transfer_date
        type: date
        label: "Дата подписания акта приёма-передачи"
        required: true
        hint: "Дата, когда вы получили ключи и подписали акт"
  - title: "Недостатки"
    fields:
      - id: defects_desc
        type: textarea
        label: "Перечислите все строительные недостатки"
        placeholder: "1. Трещины на стенах в комнате\n2. Промерзает угол на кухне\n3. Окна пропускают воздух"
        required: true
        hint: "Чем подробнее — тем сильнее претензия. Перечислите каждый недостаток отдельно"
      - id: defects_amount
        type: number
        label: "Оценочная стоимость устранения, ₽"
        placeholder: "150000"
        hint: "Если есть смета или заключение эксперта — укажите сумму"
      - id: elimination_period
        type: radio
        label: "Требуемый срок устранения недостатков"
        required: true
        options:
          - value: "15"
            label: "15 дней"
          - value: "30"
            label: "30 дней"
          - value: "45"
            label: "45 дней"
      - id: problem_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Застройщик уже приходил, смотрел, но ничего не сделал"

legal_refs:
  - law: "ФЗ-214 ст. 7 — гарантийные обязательства застройщика (5 лет)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  - law: "ЗоЗПП ст. 29 — права потребителя при недостатках"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 723 — последствия ненадлежащего качества работы"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"

legal_refs_by_branch:
  elimination_period:"15":
    - law: "ФЗ-214 ст. 7 ч. 2 — срок устранения недостатков не может превышать разумный (как правило 45 дней)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
    - law: "ЗоЗПП ст. 20 — срок устранения недостатков товара (до 45 дней)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  elimination_period:"30":
    - law: "ФЗ-214 ст. 7 ч. 2 — устранение недостатков в разумный срок по соглашению сторон"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  elimination_period:"45":
    - law: "ФЗ-214 ст. 7 ч. 2 — 45 дней: предельный разумный срок устранения строительных недостатков"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
    - law: "ЗоЗПП ст. 29 ч. 1 — при нарушении срока устранения — право отказаться от договора"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
