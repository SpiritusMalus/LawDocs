id: debt_collector
category: legal
title: "Коллекторы нарушают закон"
blurb: "Коллекторы звонят ночью, угрожают или давят — составим жалобу в ФССП."
examples: "Звонки в ночное время, угрозы, звонки родственникам и на работу, давление"
document_type: zhaloba
template_file: null

header_fields:
  - label: "Руководителю Управления ФССП России по"
    field: region
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violations_section]

  {{llm_narrative}}

  [calculated_recordings_section]

  [calculated_demand_section]

narrative_fields:
  - contact_desc

narrative_prompt: |
  Опиши на юридическом языке: кто и когда звонил, в какое время, что говорили.
  Укажи конкретные нарушения ФЗ-230 применительно к описанным действиям.
  Если описаны угрозы — упомяни их как нарушение запрета психологического давления.
  Используй только данные из формы.

wizard_steps:
  - title: "Долг и коллекторы"
    fields:
      - id: creditor_name
        type: text
        label: "Кредитор (банк или МФО, выдавший кредит)"
        placeholder: "Сбербанк, МФО «Займер»…"
        required: true
      - id: collector_name
        type: text
        label: "Название коллекторской организации (если знаете)"
        placeholder: "ООО «ПКО «ЭОС», АО «Первое коллекторское бюро»…"
      - id: debt_desc
        type: text
        label: "Краткое описание долга"
        placeholder: "Кредит на карту от 2022 года, сумма ~80 000 руб."
        required: true
  - title: "Нарушения"
    fields:
      - id: violation_types
        type: radio
        label: "Что делают коллекторы"
        required: true
        options:
          - value: night_calls
            label: "Звонят ночью или рано утром"
          - value: frequency
            label: "Звонят слишком часто (больше раза в день)"
          - value: threats
            label: "Угрожают, давят психологически"
          - value: third_parties
            label: "Звонят родственникам, коллегам или работодателю"
          - value: no_intro
            label: "Не представляются, скрывают организацию"
          - value: other
            label: "Другое нарушение"
      - id: contact_desc
        type: textarea
        label: "Опишите подробно, что происходит"
        placeholder: "Звонят каждый день в 6 утра, говорят «вас посадят», угрожают приехать домой…"
        required: true
      - id: first_contact_date
        type: date
        label: "Когда началось преследование"
  - title: "Доказательства и регион"
    fields:
      - id: has_recordings
        type: radio
        label: "Есть аудио/видеозаписи или скриншоты звонков"
        required: true
        options:
          - value: "yes"
            label: "Да, есть записи"
          - value: "no"
            label: "Нет, только мои показания"
      - id: region
        type: text
        label: "Субъект РФ (в дательном падеже)"
        placeholder: "Москве, Санкт-Петербурге, Краснодарскому краю…"
        required: true
        hint: "Напишите в дательном падеже, например: «Москве» → «по г. Москве»"

legal_refs:
  - law: "ФЗ-230 ст. 7 — ограничения по способам и времени взаимодействия коллекторов"
    url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  - law: "ФЗ-230 ст. 8 — право должника отказаться от взаимодействия с коллекторами"
    url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  - law: "КоАП РФ ст. 14.57 — административная ответственность коллекторов"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
  - law: "ГК РФ ст. 385 — уведомление должника об уступке права требования"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"

legal_refs_by_branch:
  violation_types:threats:
    - law: "УК РФ ст. 119 — угроза убийством или причинением тяжкого вреда здоровью"
      url: "https://www.consultant.ru/document/cons_doc_LAW_10699/"
  violation_types:third_parties:
    - law: "ФЗ-230 ст. 7 ч. 5 — запрет взаимодействия с третьими лицами без их согласия"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  violation_types:night_calls:
    - law: "ФЗ-230 ст. 7 ч. 3 — запрет взаимодействия в ночное время (22:00-8:00 будни, 20:00-9:00 выходные)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  violation_types:frequency:
    - law: "ФЗ-230 ст. 7 ч. 3 — ограничение количества звонков: не более 1 в сутки, 2 в неделю, 8 в месяц"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  violation_types:no_intro:
    - law: "ФЗ-230 ст. 7 ч. 4 — обязанность представиться и назвать организацию при каждом контакте"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  violation_types:other:
    - law: "ФЗ-230 ст. 6 — общие требования к действиям коллекторов при взаимодействии с должником"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
  has_recordings:yes:
    - law: "ГПК РФ ст. 55 — аудиозаписи как доказательства в суде"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  has_recordings:no:
    - law: "ФЗ-230 ст. 16 — жалоба в ФССП как основной способ защиты при нарушениях коллекторов"
      url: "https://www.consultant.ru/document/cons_doc_LAW_200497/"
