id: neighbor_flood
category: housing
title: "Сосед затопил квартиру"
blurb: "Из-за соседей квартира пострадала от залива — они отказываются возмещать ущерб."
examples: "Прорвало трубу у соседей, оставили кран, протечка кровли через верхнего соседа"
document_type: pretenziya
template_file: null

header_fields:
  - field: neighbor_name
  - field: neighbor_address_full
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из flood_cause + damage_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства залива
  официально-деловым стилем: дата происшествия, откуда пришла вода, причина залива,
  что именно пострадало в квартире. Исправь орфографические и грамматические ошибки.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - flood_cause
  - damage_desc

wizard_steps:
  - title: "Залив — когда и где"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес пострадавшей квартиры"
        placeholder: "г. Москва, ул. Ленина, д. 5, кв. 12"
        required: true
      - id: incident_date
        type: date
        label: "Дата залива"
        required: true
      - id: flood_source
        type: radio
        label: "Откуда пришла вода"
        required: true
        options:
          - value: upper_neighbor
            label: "Из квартиры соседа сверху"
          - value: same_floor
            label: "Из квартиры на том же этаже"
          - value: management_company
            label: "Общедомовые коммуникации (ответственность УК)"
          - value: roof
            label: "Протечка кровли"
      - id: flood_cause
        type: textarea
        label: "Причина залива"
        placeholder: "Лопнул шланг стиральной машины, не закрыли кран, течь кровли…"
        required: true
  - title: "Виновная сторона"
    fields:
      - id: neighbor_name
        type: text
        label: "ФИО виновника (или название УК)"
        placeholder: "Сидоров Пётр Иванович"
        required: true
      - id: neighbor_apartment
        type: text
        label: "Квартира виновника"
        placeholder: "кв. 24 (этажом выше)"
      - id: neighbor_address_full
        type: text
        label: "Адрес для направления претензии"
        placeholder: "тот же дом, кв. 24 — или другой адрес"
        hint: "Если виновник живёт в той же квартире — укажите тот же адрес + номер квартиры"
      - id: has_act
        type: radio
        label: "Составлен ли акт о заливе"
        required: true
        options:
          - value: "yes"
            label: "Да, УК составила акт"
          - value: "no"
            label: "Нет, только фотографии"
      - id: neighbor_reaction
        type: radio
        label: "Позиция виновника"
        options:
          - value: denies
            label: "Отрицает вину"
          - value: ignores
            label: "Игнорирует"
          - value: admits_no_pay
            label: "Признаёт, но платить отказывается"
          - value: unknown
            label: "Ещё не обращался(ась)"
  - title: "Ущерб"
    fields:
      - id: damage_desc
        type: textarea
        label: "Что пострадало"
        placeholder: "Залит потолок и стены в кухне, вздулся паркет, испорчена мебель…"
        required: true
      - id: damage_amount
        type: number
        label: "Оценка ущерба, ₽"
        placeholder: "150000"
        required: true
      - id: has_estimate
        type: radio
        label: "Есть независимая оценка ущерба"
        options:
          - value: "yes"
            label: "Да, есть заключение оценщика"
          - value: "no"
            label: "Нет, оцениваю самостоятельно"

legal_refs:
  - law: "ГК РФ ст. 1064 — обязанность возмещения вреда"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ЖК РФ ст. 30 — обязанности собственника помещения"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
