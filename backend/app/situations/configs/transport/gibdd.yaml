id: gibdd
category: transport
title: "Оспорить штраф ГИБДД"
blurb: "Вынесли постановление о штрафе, с которым вы не согласны — есть 10 дней на жалобу."
examples: "Камера зафиксировала чужое нарушение, за рулём был другой человек, ошибка в постановлении"
document_type: zhaloba
template_file: null

header_fields:
  - field: gibdd_unit
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_legal_section]

  [calculated_objection_section]

  {{llm_narrative}}

  [calculated_demand_section]

  _________________ / _________________

narrative_fields:
  - problem_desc

narrative_prompt: |
  Опиши на юридическом языке: когда и где произошло нарушение согласно постановлению, какое ТС, какая статья КоАП, какой размер штрафа.
  Чётко изложи, почему постановление незаконно или необоснованно, исходя из указанного основания обжалования.
  Используй только данные из формы.

wizard_steps:
  - title: "Постановление"
    fields:
      - id: fine_number
        type: text
        label: "Номер постановления"
        placeholder: "18810177240512345678"
        hint: "Указан на квитанции или в письме"
      - id: violation_date
        type: date
        label: "Дата нарушения по постановлению"
        required: true
      - id: violation_place
        type: text
        label: "Место нарушения"
        placeholder: "г. Москва, ул. Тверская, 1"
        required: true
      - id: vehicle
        type: text
        label: "Транспортное средство / гос. номер"
        placeholder: "Toyota Camry, А123БВ 777"
        required: true
      - id: violation_article
        type: text
        label: "Статья КоАП (если указана в постановлении)"
        placeholder: "ч. 2 ст. 12.9 КоАП РФ"
      - id: amount
        type: number
        label: "Сумма штрафа, ₽"
        placeholder: "3000"
        required: true
  - title: "Почему не согласны"
    fields:
      - id: objection_reason
        type: radio
        label: "Основание жалобы"
        required: true
        options:
          - value: not_driving
            label: "За рулём был другой человек"
          - value: no_violation
            label: "Нарушения не было"
          - value: camera_error
            label: "Ошибка камеры или радара"
          - value: procedural
            label: "Нарушен порядок оформления / истёк срок давности"
          - value: other
            label: "Другое основание"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что произошло, почему считаете постановление незаконным"
        required: true
      - id: additional_desc
        type: textarea
        label: "Доказательства и обстоятельства"
        placeholder: "Свидетели, видеозапись, другие доказательства"
  - title: "Куда подаём жалобу"
    fields:
      - id: appeal_to
        type: radio
        label: "Куда направить жалобу"
        required: true
        options:
          - value: gibdd_chief
            label: "Начальнику ГИБДД (вышестоящему должностному лицу)"
          - value: court
            label: "В суд (районный или мировой)"
      - id: gibdd_unit
        type: text
        label: "Подразделение ГИБДД (для жалобы начальнику)"
        placeholder: "ГИБДД УМВД России по г. Москве"
        hint: "Заполните, если жалоба идёт начальнику ГИБДД"

legal_refs:
  - law: "КоАП РФ ст. 30.1–30.3 — право и порядок обжалования постановления"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
  - law: "КоАП РФ ст. 2.6.1 — ответственность владельцев ТС"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
  - law: "КоАП РФ ст. 24.5 — обстоятельства, исключающие производство"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
