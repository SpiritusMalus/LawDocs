id: medical
category: consumer
title: "Медицинская организация нарушила права"
blurb: "Клиника или больница оказала некачественную помощь, отказала в лечении или выставила незаконный счёт."
examples: "Отказали в помощи по полису, некачественное лечение, навязали платные услуги, нарушили врачебную тайну"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: clinic_name
  - field: clinic_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из problem_desc + damage_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  официально-деловым стилем: когда и в какую организацию обратился пациент, что произошло,
  какой вред причинён. Исправь орфографические и грамматические ошибки. Сохрани все факты.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc
  - damage_desc

wizard_steps:
  - title: "Медицинская организация"
    fields:
      - id: clinic_name
        type: text
        label: "Название клиники или больницы"
        placeholder: "ГБУЗ «Городская больница № 1» или ООО «МедЦентр Плюс»"
        required: true
      - id: clinic_address
        type: text
        label: "Адрес медицинской организации"
        placeholder: "г. Москва, ул. Здоровья, д. 10"
      - id: treatment_date
        type: date
        label: "Дата обращения за помощью"
        required: true
      - id: insurance_type
        type: radio
        label: "Тип обращения"
        options:
          - value: oms
            label: "По полису ОМС (бесплатно)"
          - value: paid
            label: "Платные услуги"
          - value: mixed
            label: "Часть по ОМС, часть платно"
          - value: unknown
            label: "Не знаю / не важно"
  - title: "Суть нарушения"
    fields:
      - id: problem_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: refused
            label: "Отказали в медицинской помощи (в том числе по ОМС)"
          - value: bad_treatment
            label: "Некачественное лечение, ошибка врача"
          - value: paid_forced
            label: "Навязали платные услуги, которые должны быть бесплатными"
          - value: confidentiality
            label: "Нарушили врачебную тайну / разгласили диагноз"
          - value: other
            label: "Другое нарушение"
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Врач отказал в выписке направления на МРТ по ОМС и предложил пройти платно. После назначенного лечения состояние ухудшилось…"
        required: true
      - id: damage_desc
        type: textarea
        label: "Какой вред причинён"
        placeholder: "Пришлось оплатить лечение последствий в другой клинике, моральные страдания, потеря трудоспособности…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: refund
            label: "Вернуть деньги за незаконно навязанные услуги"
          - value: compensation
            label: "Возместить расходы на лечение последствий"
          - value: redo
            label: "Провести повторное лечение / исправить за свой счёт"
          - value: apology_and_check
            label: "Провести проверку и привлечь виновных"
      - id: paid_amount
        type: number
        label: "Сумма незаконно взысканных средств, ₽"
        placeholder: "5000"
        hint: "Заполните, если требуете возврат денег"

legal_refs:
  - law: "ФЗ-323 ст. 20 — добровольное информированное согласие пациента"
    url: "https://www.consultant.ru/document/cons_doc_LAW_121895/0b1cadf39ebeb0f1fed2ef0b8ebab5973197d7f1/"
  - law: "ФЗ-323 ст. 22 — право пациента на получение медицинской документации"
    url: "https://www.consultant.ru/document/cons_doc_LAW_121895/d2872d82b3b26ca307971f590ce02dd37f71cafc/"
  - law: "ПП РФ №736 — Правила предоставления платных медицинских услуг (заменил №1006 с 2023 г.)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_447009/109c5e9202fcec98e5404fdebbcc6bf6b971a32e/"
  - law: "ЗоЗПП ст. 4, 29 — качество услуги и права при недостатках"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/030ee6c590df5a57ef7c36c7cc5c6a59e5373ecc/"

legal_refs_by_branch:
  problem_type:confidentiality:
    - law: "ФЗ-323 ст. 13 — врачебная тайна, запрет разглашения сведений о пациенте"
      url: "https://www.consultant.ru/document/cons_doc_LAW_121895/9f906d460f9454a8a0d290738d9fc2798c1e865a/"
    - law: "ФЗ-152 «О персональных данных» — защита медицинских персональных данных"
      url: "https://www.consultant.ru/document/cons_doc_LAW_61801/6c94959bc017ac80140621762d2ac59f6006b08c/"
  problem_type:bad_treatment:
    - law: "ФЗ-323 ст. 70 — права и обязанности лечащего врача"
      url: "https://www.consultant.ru/document/cons_doc_LAW_121895/2c37eeb7b3dac431acdf6e9b8c50416f260213ed/"
  problem_type:refused:
    - law: "ФЗ-323 ст. 19 — право на получение медицинской помощи в гарантированном объёме"
      url: "https://www.consultant.ru/document/cons_doc_LAW_121895/2912a75fd9253758c03a8c9069299a513b58b620/"
    - law: "ФЗ-323 ст. 11 — запрет на отказ в медицинской помощи"
      url: "https://www.consultant.ru/document/cons_doc_LAW_121895/8e8caa29efb42dd54e3924ee7441f06d469f4a80/"
  problem_type:paid_forced:
    - law: "ЗоЗПП ст. 16 — недействительность условий об обязательных платных услугах в ОМС"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/9eb0f127ead4dc57e7d0a9d4954cf264c4b3cea8/"
    - law: "ФЗ-326 «Об обязательном медицинском страховании» ст. 16 — право на бесплатную помощь по ОМС"
      url: "https://www.consultant.ru/document/cons_doc_LAW_107289/c550eb78d00bfca0be7df1baf398cdd7bd24bc12/"
  problem_type:other:
    - law: "ФЗ-323 ст. 79 — обязанности медицинских организаций перед пациентом"
      url: "https://www.consultant.ru/document/cons_doc_LAW_121895/256d3c9ccb172b31210f5f1728fd5a3f538a3cce/"
