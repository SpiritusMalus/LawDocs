id: court_order
category: legal
title: "Отменить судебный приказ"
blurb: "Мировой суд вынес приказ о взыскании долга без вашего участия — есть 10 дней, чтобы его отменить."
examples: "Взыскание банком, МФО, коллектором, ЖКХ, налоговой; отмена через возражение"
document_type: vozrazheniye
template_file: null

system_prompt: |
  Ты — юрист по гражданскому процессу. Составь возражение на судебный приказ для подачи мировому судье.

  Структура документа:
  1. Шапка:
     «Мировому судье [court_name]»
     «От должника: [full_name], [contact_address], [phone], [email]»
     «Взыскатель: [creditor_name]»
     «Дело № [case_number]»
  2. Заголовок: ВОЗРАЖЕНИЕ
  3. Вводная часть: судебный приказ №[case_number] вынесен [order_date] (если указана), взыскатель — [creditor_name], сумма взыскания — [debt_amount] руб. Тип кредитора не упоминай кодом — банк/МФО/ЖКХ пиши по-русски исходя из названия.
  4. Дата получения: «Судебный приказ получен мной [receive_date]». Подчеркнуть, что настоящее возражение подаётся в установленный 10-дневный срок (ст. 128 ГПК РФ).
  5. Правовое обоснование:
     — ГПК РФ ст. 128: должник вправе в течение 10 дней со дня получения судебного приказа представить возражения против его исполнения
     — ГПК РФ ст. 129: судья обязан отменить судебный приказ при поступлении возражений должника, после чего взыскатель вправе предъявить своё требование в порядке искового производства
     — Конституционный Суд РФ: для принятия возражения закон не требует их мотивировки — достаточно выражения несогласия с исполнением приказа
  6. Основание несогласия (objection_reason):
     — dispute_debt: указать, что должник оспаривает само существование задолженности
     — dispute_amount: указать, что должник считает заявленную сумму неверной / завышенной
     — already_paid: указать, что задолженность погашена полностью или частично
     — procedural: указать на нарушение порядка вынесения приказа или истечение срока исковой давности
     — other: кратко обозначить основание из problem_desc
  7. Если указан [additional_desc] — включи его содержание в текст как отдельный абзац без заголовка
  8. Требование: отменить судебный приказ №[case_number] полностью на основании ст. 129 ГПК РФ
  9. Приложение: копия документа, подтверждающего дату получения судебного приказа
  10. Дата и подпись

ai_narrative_prompt: |
  Кратко изложи: кто является взыскателем, какая сумма взыскана по приказу, когда приказ получен.
  Укажи, что должник не был уведомлён о рассмотрении дела и выражает несогласие с исполнением судебного приказа.
  Если есть дополнительные обстоятельства — включи их.
  Используй только данные из формы.

wizard_steps:
  - title: "Суд и приказ"
    fields:
      - id: court_name
        type: text
        label: "Мировой суд (название или номер участка)"
        placeholder: "Судебный участок №5 Пресненского района г. Москвы"
        required: true
      - id: case_number
        type: text
        label: "Номер дела / судебного приказа"
        placeholder: "2-1234/2025"
        required: true
      - id: order_date
        type: date
        label: "Дата вынесения приказа"
        hint: "Указана в тексте приказа"
      - id: receive_date
        type: date
        label: "Дата получения приказа вами"
        required: true
        hint: "Срок возражения — 10 дней с этой даты. Действуйте быстро!"
  - title: "Взыскатель и сумма"
    fields:
      - id: creditor_name
        type: text
        label: "Кто взыскивает (взыскатель)"
        placeholder: "ПАО Сбербанк, ООО «МФК Займ Плюс»"
        required: true
      - id: creditor_type
        type: radio
        label: "Тип взыскателя"
        required: true
        options:
          - value: bank
            label: "Банк"
          - value: mfo
            label: "МФО / коллектор"
          - value: housing
            label: "ЖКХ / управляющая компания"
          - value: tax
            label: "ФНС / налоговая"
          - value: other
            label: "Другое"
      - id: debt_amount
        type: number
        label: "Сумма по приказу, ₽"
        placeholder: "85000"
        required: true
  - title: "Ваши возражения"
    fields:
      - id: objection_reason
        type: radio
        label: "Основание возражения"
        required: true
        options:
          - value: dispute_debt
            label: "Оспариваем сам долг (ничего не должны)"
          - value: dispute_amount
            label: "Оспариваем сумму (завышена, ошибка в расчёте)"
          - value: already_paid
            label: "Долг уже оплачен (полностью или частично)"
          - value: procedural
            label: "Нарушения при выдаче приказа / истёк срок давности"
          - value: other
            label: "Другое"
      - id: additional_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Что важно знать суду: внесённые платежи, срок давности, ошибки в расчёте"

legal_refs:
  - law: "ГПК РФ ст. 128-129 — возражение на судебный приказ и его отмена"
    url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
  - law: "ГПК РФ ст. 121-127 — порядок выдачи судебного приказа"
    url: "https://www.consultant.ru/document/cons_doc_LAW_39570/"
