id: debt_collector
category: legal
title: "Коллекторы нарушают закон"
blurb: "Коллекторы звонят ночью, угрожают или давят — составим жалобу в ФССП."
examples: "Звонки в ночное время, угрозы, звонки родственникам и на работу, давление"
document_type: zhaloba
template_file: null

header_fields:
  - label: "Руководителю Управления ФССП России по"
    field: region
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по защите прав граждан. Составь жалобу на незаконные действия коллекторской организации в ФССП России.
  После шапки напиши заголовок ЖАЛОБА — одним словом, заглавными, отдельной строкой, без пояснений после.
  Вводная часть: связным текстом — в отношении долга перед [creditor_name] (описание: [debt_desc]) ко мне обратилась коллекторская организация [collector_name] (если известна). Не выводи метки «Кредитор:», «Коллекторская организация:», «Долг по договору:».
  Описание нарушений — перечислить все из violation_types нумерованным списком:
     — Если "night_calls": коллекторы звонят в запрещённое время. По ст. 7 ч. 3 ФЗ-230: в будние дни — только с 08:00 до 22:00 по местному времени, в выходные и праздники — с 09:00 до 20:00. Указать конкретные факты из contact_desc.
     — Если "frequency": звонки превышают: 1 раз в сутки, 2 раза в неделю, 8 раз в месяц (ст. 7 ч. 3 ФЗ-230). Указать из contact_desc.
     — Если "threats": психологическое давление, угрозы уголовным преследованием, физической расправой, разглашением информации — запрещено ст. 6 ч. 2 ФЗ-230.
     — Если "third_parties": звонки третьим лицам (родственникам, коллегам, работодателю) без письменного согласия должника — нарушение ст. 4 ч. 5 ФЗ-230.
     — Если "no_intro": не представляются, не называют организацию и кредитора — нарушение ст. 7 ч. 4 ФЗ-230.
     — Если "other": описать из contact_desc.
  Требование: провести проверку и привлечь коллекторскую организацию к административной ответственности по ч. 1 ст. 14.57 КоАП РФ (штраф от 50 000 до 500 000 руб.).
  Если пользователь указал has_recordings = "yes" — упомяни: «Факты нарушений подтверждены аудиозаписями звонков, которые прилагаются.»
  Также уведомить: жалоба направлена одновременно в Банк России (если речь идёт о кредите банка) и в прокуратуру.
  Список приложений включи в текст последнего абзаца: «К жалобе прилагаются: скриншоты звонков[, аудиозаписи разговоров — если has_recordings=yes][, копия долгового договора — если есть].» Не выводи метку «Приложения:» отдельной строкой.

  ВАЖНО: не употребляй слов «возможно», «вероятно». Жалоба — конкретный документ с ссылками на нормы.
  ВАЖНО: не оставляй пустых абзацев между разделами. Каждый абзац должен заканчиваться точкой. Слово «прошу» пиши со строчной буквы в середине предложения, или начинай абзац с «На основании изложенного прошу:».
  ДИСКЛЕЙМЕР: данная жалоба является досудебным обращением и не является юридической консультацией.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
ai_narrative_prompt: |
  Опиши на юридическом языке: кто и когда звонил, в какое время, что говорили.
  Укажи конкретные нарушения ФЗ-230 применительно к описанным действиям.
  Если описаны угрозы — упомяни их как нарушение запрета психологического давления.
  Используй только данные из формы.

wizard_steps:
  - title: "Долг и коллекторы"
    fields:
      - id: creditor_name
        type: text
        label: "Кредитор (банк или МФО, выдавший кредит)"
        placeholder: "Сбербанк, МФО «Займер»…"
        required: true
      - id: collector_name
        type: text
        label: "Название коллекторской организации (если знаете)"
        placeholder: "ООО «ПКО «ЭОС», АО «Первое коллекторское бюро»…"
      - id: debt_desc
        type: text
        label: "Краткое описание долга"
        placeholder: "Кредит на карту от 2022 года, сумма ~80 000 руб."
        required: true
  - title: "Нарушения"
    fields:
      - id: violation_types
        type: radio
        label: "Что делают коллекторы"
        required: true
        options:
          - value: night_calls
            label: "Звонят ночью или рано утром"
          - value: frequency
            label: "Звонят слишком часто (больше раза в день)"
          - value: threats
            label: "Угрожают, давят психологически"
          - value: third_parties
            label: "Звонят родственникам, коллегам или работодателю"
          - value: no_intro
            label: "Не представляются, скрывают организацию"
          - value: other
            label: "Другое нарушение"
      - id: contact_desc
        type: textarea
        label: "Опишите подробно, что происходит"
        placeholder: "Звонят каждый день в 6 утра, говорят «вас посадят», угрожают приехать домой…"
        required: true
      - id: first_contact_date
        type: date
        label: "Когда началось преследование"
  - title: "Доказательства и регион"
    fields:
      - id: has_recordings
        type: radio
        label: "Есть аудио/видеозаписи или скриншоты звонков"
        required: true
        options:
          - value: "yes"
            label: "Да, есть записи"
          - value: "no"
            label: "Нет, только мои показания"
      - id: region
        type: text
        placeholder: "Москве, Санкт-Петербурге, Краснодарскому краю…"
        required: true
        hint: "Напишите в дательном падеже, например: «Москве» → «по г. Москве»"

legal_refs:
  - law: "ФЗ-230 «О защите прав при взыскании просроченной задолженности»"
    url: "https://www.consultant.ru/document/cons_doc_LAW_201271/"
  - law: "КоАП РФ ст. 14.57 — ответственность коллекторов"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34661/"
