id: ddu_delay
category: housing
title: "Застройщик задержал передачу квартиры"
blurb: "Срок передачи квартиры по ДДУ прошёл, но ключи вам так и не дали."
examples: "Просрочка сдачи дома, затянувшееся строительство, застройщик переносит сроки"
document_type: pretenziya
template_file: null

header_fields:
  - field: developer_name
  - field: developer_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по долевому строительству. Составь претензию застройщику о взыскании неустойки за просрочку передачи квартиры по ДДУ.
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после.
  Обстоятельства: между мной и застройщиком заключён ДДУ №[contract_number] от [contract_date]; объект — квартира по адресу [apartment_address]; цена договора — [contract_price] руб.
  Нарушение:
     — Плановая дата передачи по договору: [planned_transfer_date]
     — Если [actual_transfer_date] указана: квартира передана [actual_transfer_date], просрочка составила [calculated_delay_days] дн.
     — Если [actual_transfer_date] не указана: по состоянию на дату составления претензии квартира не передана, просрочка составляет [calculated_delay_days] дн.
  Расчёт неустойки по ст. 6 ч. 2 Федерального закона от 30.12.2004 № 214-ФЗ (для граждан: 1/150 ставки рефинансирования за каждый день):
     [contract_price] руб. × [cb_rate]% / 100 / 150 × [calculated_delay_days] дн. = [calculated_neustoyka] руб.
     Приведи именно этот расчёт дословно, только с подстановкой конкретных цифр.
  Описание ситуации из [problem_desc]
  Требования:
     а) Выплатить неустойку в размере [calculated_neustoyka] руб. в течение 10 календарных дней с даты получения настоящей претензии;
     б) Передать объект долевого строительства в разумный срок (если квартира ещё не передана).
  При неудовлетворении — обращение в суд; будет взыскано: неустойка, компенсация морального вреда, штраф 50% от присуждённой суммы (ст. 13 ч. 6 Закона РФ «О защите прав потребителей»), судебные расходы.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
ai_narrative_prompt: |
  Опиши на юридическом языке: реквизиты ДДУ, адрес квартиры, цену договора, плановую и фактическую даты передачи.
  Укажи, что застройщик нарушил срок передачи объекта долевого строительства.
  Если квартира ещё не передана — укажи, что она не передана по состоянию на дату составления претензии.
  Используй только данные из формы.

wizard_steps:
  - title: "Застройщик"
    fields:
      - id: developer_name
        type: text
        label: "Наименование застройщика"
        placeholder: "ООО «СтройГрупп»"
        required: true
      - id: developer_address
        type: text
        label: "Юридический адрес застройщика"
        placeholder: "г. Москва, ул. Строителей, д. 1"
        hint: "Найдите в ДДУ или на сайте застройщика"
  - title: "Договор"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес квартиры (объекта ДДУ)"
        placeholder: "г. Москва, ул. Новая, д. 15, кв. 42"
        required: true
      - id: contract_number
        type: text
        label: "Номер ДДУ"
        placeholder: "№ 123/2022-ДДУ"
        required: true
      - id: contract_date
        type: date
        label: "Дата заключения ДДУ"
        required: true
      - id: contract_price
        type: number
        label: "Цена договора (ДДУ), ₽"
        placeholder: "5000000"
        required: true
  - title: "Просрочка"
    fields:
      - id: planned_transfer_date
        type: date
        label: "Плановая дата передачи по ДДУ"
        required: true
        hint: "Указана в договоре долевого участия"
      - id: actual_transfer_date
        type: date
        label: "Фактическая дата передачи квартиры"
        hint: "Оставьте пустым, если квартира ещё не передана"
      - id: cb_rate
        type: number
        label: "Ключевая ставка ЦБ РФ на дату начала просрочки, %"
        placeholder: "21"
        required: true
        hint: "Актуальную ставку смотрите на сайте cbr.ru в разделе «Ключевая ставка»"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Дом сдаётся с задержкой, застройщик переносит сроки без уведомления"
        required: true

legal_refs:
  - law: "ФЗ-214 ст. 6 — неустойка за просрочку передачи"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  - law: "ЗоЗПП ст. 13 — штраф 50% за отказ выплатить в досудебном порядке"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 151 — компенсация морального вреда"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
