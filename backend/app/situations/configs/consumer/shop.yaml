id: shop
category: consumer
title: "Магазин не возвращает деньги"
blurb: "Купили товар, он сломался или не подошёл — продавец отказывает в возврате."
examples: "Товар ненадлежащего качества, отказ в возврате в 14 дней, навязанные услуги"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: store_name
  - field: store_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# все секции рендерит calculate_shop (нет narrative_fields — 0 LLM-вызовов).
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  [calculated_legal_section]

  [calculated_penalty_section]

  [calculated_demand_section]

narrative_fields: []

wizard_steps:
  - title: "Магазин и покупка"
    fields:
      - id: store_name
        type: text
        label: "Название магазина"
        placeholder: "М.Видео, DNS, Спортмастер…"
        required: true
      - id: store_address
        type: text
        label: "Адрес магазина или сайт"
        placeholder: "ул. Ленина, 1 или www.mvideo.ru"
      - id: product_name
        type: text
        label: "Что купили"
        placeholder: "Смартфон Samsung Galaxy S24"
        required: true
      - id: product_price
        type: number
        label: "Стоимость, ₽"
        placeholder: "35000"
        required: true
      - id: purchase_date
        type: date
        label: "Дата покупки"
        required: true
  - title: "Что случилось"
    fields:
      - id: problem_type
        type: radio
        label: "Тип проблемы"
        required: true
        options:
          - value: defect
            label: "Товар оказался некачественным / сломался"
          - value: return14
            label: "Отказывают в возврате в 14-дневный срок"
          - value: warranty
            label: "Проблема с гарантийным ремонтом"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Что именно сломалось или в чём отказывают"
        required: true
      - id: appeal_date
        type: date
        label: "Когда обратились в магазин"
      - id: store_response
        type: textarea
        label: "Что ответил магазин"
        placeholder: "Отказали, сославшись на…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: refund
            label: "Вернуть деньги"
          - value: replace
            label: "Заменить товар"
          - value: repair
            label: "Провести гарантийный ремонт"
          - value: other
            label: "Другое"
      - id: penalty_start_date
        type: date
        label: "Дата начала неустойки"
        hint: "Обычно — дата отказа магазина или дата обращения"

legal_refs:
  - law: "ЗоЗПП ст. 18 — права при обнаружении недостатков товара (замена, ремонт, возврат)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ЗоЗПП ст. 25 — обмен товара надлежащего качества в течение 14 дней"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ЗоЗПП ст. 19, 20 — сроки предъявления требований и устранения недостатков"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 475 — последствия передачи товара ненадлежащего качества"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ПП РФ №2463 — Правила продажи товаров (перечень невозвратных товаров)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_373622/"
