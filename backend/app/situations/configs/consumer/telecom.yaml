id: telecom
category: consumer
title: "Интернет или телефон не работает"
blurb: "Провайдер не оказывает услуги по договору, списывает деньги незаконно или отключает без причины."
examples: "Скорость ниже заявленной, перебои в работе, незаконные списания, навязали платные опции"
document_type: pretenziya
template_file: null

header_fields:
  - field: provider_name
  - field: provider_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# все секции рендерит calculate_telecom (нет narrative_fields — 0 LLM-вызовов).
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  [calculated_legal_section]

  [calculated_refund_section]

  [calculated_demand_section]

narrative_fields: []

wizard_steps:
  - title: "Провайдер и договор"
    fields:
      - id: provider_name
        type: text
        label: "Название провайдера"
        placeholder: "Ростелеком, МТС, Билайн, Дом.ру…"
        required: true
      - id: provider_address
        type: text
        label: "Адрес офиса или юридический адрес"
        placeholder: "Найдите в договоре или на сайте провайдера в разделе «Контакты»"
      - id: contract_number
        type: text
        label: "Номер договора / лицевого счёта"
        placeholder: "№ 1234567890"
      - id: service_type
        type: radio
        label: "Тип услуги"
        required: true
        options:
          - value: internet
            label: "Домашний интернет"
          - value: mobile
            label: "Мобильная связь"
          - value: tv
            label: "Кабельное или спутниковое ТВ"
          - value: bundle
            label: "Пакет услуг (интернет + ТВ + телефон)"
  - title: "Суть проблемы"
    fields:
      - id: problem_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: no_service
            label: "Услуга полностью не работает"
          - value: slow_speed
            label: "Скорость ниже заявленной по договору"
          - value: illegal_charges
            label: "Незаконно списали деньги или подключили платные услуги"
          - value: disconnected
            label: "Отключили без предупреждения и законного основания"
          - value: other
            label: "Другое нарушение"
      - id: problem_start_date
        type: date
        label: "С какой даты проблема"
        required: true
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Интернет не работает с 10 мая, скорость 2 Мбит при тарифе 100 Мбит, списали 890 руб. за опцию «Семейный контент»…"
        required: true
      - id: complaint_date
        type: date
        label: "Когда обращались в поддержку"
      - id: provider_response
        type: textarea
        label: "Что ответил провайдер"
        placeholder: "Сказали «идут технические работы», отказали в перерасчёте…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: fix
            label: "Устранить неисправность и восстановить услугу"
          - value: refund
            label: "Вернуть деньги за период отсутствия услуги"
          - value: cancel_charges
            label: "Отменить незаконные списания и вернуть деньги"
          - value: terminate
            label: "Расторгнуть договор без штрафа и вернуть остаток"
      - id: monthly_fee
        type: number
        label: "Ежемесячный платёж по тарифу, ₽"
        placeholder: "890"
        hint: "Нужно для расчёта суммы возврата"

legal_refs:
  - law: "ФЗ «О связи» — права абонента и обязанности оператора"
    url: "https://www.consultant.ru/document/cons_doc_LAW_43224/"
  - law: "Закон о защите прав потребителей ст. 29"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
