id: marketplace
category: consumer
title: "Проблема с маркетплейсом"
blurb: "Wildberries или Ozon списали деньги, потеряли товар, отказались принимать возврат."
examples: "Платный возврат, удержание за подмену, потеря на ПВЗ"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Генеральному директору"
    field: platform
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из problem_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–4 предложения) опиши фактические обстоятельства
  официально-деловым стилем: что заказано, когда, что произошло (штраф, платный возврат,
  потеря товара, отказ в возврате). Исправь ошибки. Сохрани все факты.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc

wizard_steps:
  - title: "Маркетплейс и заказ"
    fields:
      - id: platform
        type: radio
        label: "Маркетплейс"
        required: true
        options:
          - value: wildberries
            label: "Wildberries"
          - value: ozon
            label: "Ozon"
          - value: yandex_market
            label: "Яндекс.Маркет"
          - value: other
            label: "Другой"
      - id: platform_other
        type: text
        label: "Другой маркетплейс (название)"
        placeholder: "AliExpress, СберМегаМаркет…"
      - id: product_name
        type: text
        label: "Название товара"
        placeholder: "Кроссовки Nike Air Max"
        required: true
      - id: order_number
        type: text
        label: "Номер заказа"
        placeholder: "12345678"
      - id: order_amount
        type: number
        label: "Сумма заказа, ₽"
        placeholder: "5990"
        required: true
      - id: order_date
        type: date
        label: "Дата заказа"
  - title: "Что случилось"
    fields:
      - id: problem_type
        type: radio
        label: "Тип проблемы"
        required: true
        options:
          - value: penalty
            label: "Незаконный штраф за «подмену товара»"
          - value: paid_return
            label: "Взяли деньги за возврат качественного товара"
          - value: lost
            label: "Потеряли заказ на складе или ПВЗ"
          - value: defect
            label: "Товар пришёл с дефектом, отказывают в возврате"
          - value: other
            label: "Другое"
      - id: incident_date
        type: date
        label: "Дата события"
      - id: withheld_amount
        type: number
        label: "Спорная / удержанная сумма, ₽"
        placeholder: "1500"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что именно произошло, что вам сказали"
        required: true
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: return_money
            label: "Вернуть удержанную сумму"
          - value: refund_order
            label: "Вернуть деньги за весь заказ"
          - value: cancel_penalty
            label: "Отменить штраф"
          - value: other
            label: "Другое"

legal_refs:
  - law: "ЗоЗПП ст. 26.1 — дистанционная торговля, ст. 18 — ненадлежащее качество"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "Постановление Правительства РФ №2463 — правила дистанционной торговли"
    url: "https://www.consultant.ru/document/cons_doc_LAW_373622/"
  - law: "ФЗ №289-ФЗ «Об отдельных вопросах регулирования платформенной экономики» — ответственность маркетплейса перед потребителем (с 01.09.2025)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_511088/"

legal_refs_by_branch:
  "problem_type:lost":
    - law: "ГК РФ ст. 886, 891 — ответственность хранителя (ПВЗ) за утрату переданной вещи"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "problem_type:penalty":
    - law: "ГК РФ ст. 333 — снижение судом несоразмерной неустойки по заявлению должника"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "problem_type:paid_return":
    - law: "ЗоЗПП ст. 26.1 — права при дистанционной продаже: возврат в течение 7 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
    - law: "ПП РФ №2463 — запрет взимания платы за возврат товара надлежащего качества"
      url: "https://www.consultant.ru/document/cons_doc_LAW_373622/"
  "problem_type:defect":
    - law: "ЗоЗПП ст. 18 — права потребителя при обнаружении недостатков товара"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
    - law: "ЗоЗПП ст. 18 ч. 3 — ответственность маркетплейса как продавца за качество товара"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  "problem_type:other":
    - law: "ФЗ «Об отдельных вопросах регулирования платформенной экономики» — ответственность агрегатора"
      url: "https://www.consultant.ru/document/cons_doc_LAW_373622/"
