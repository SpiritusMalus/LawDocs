id: ddu_termination
category: housing
title: "Расторгнуть ДДУ и вернуть деньги"
blurb: "Хотите выйти из долевого строительства: застройщик затянул сроки или стройка стоит."
examples: "Просрочка более 2 месяцев, замороженная стройка, существенные недостатки"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по долевому строительству. Составь уведомление о расторжении договора участия в долевом строительстве (ДДУ) в одностороннем порядке и требование о возврате денежных средств с процентами.

  Структура документа:
  1. Шапка: «[developer_name], [developer_address]» / «От: [full_name], [contact_address], тел. [phone], [email]»
  2. Заголовок: УВЕДОМЛЕНИЕ об одностороннем расторжении договора участия в долевом строительстве и требование о возврате денежных средств
  3. Обстоятельства: ДДУ №contract_number от contract_date; объект — квартира apartment_address; цена договора — contract_price руб.; оплачен payment_date
  4. Основание расторжения — раскрой в зависимости от termination_reason:
     — delay_2months: ст. 9 ч. 1 п. 1 Федерального закона № 214-ФЗ — нарушение предусмотренного договором срока передачи объекта долевого строительства более чем на два месяца
     — defects_major: ст. 9 ч. 1 п. 2 ФЗ-214 — существенное нарушение требований к качеству объекта долевого строительства
     — construction_stopped: ст. 9 ч. 1 п. 3 ФЗ-214 — прекращение или приостановление строительства многоквартирного дома при наличии обстоятельств, очевидно свидетельствующих о том, что в предусмотренный договором срок объект долевого строительства не будет передан
     — other: ст. 9 ФЗ-214 (изложи основание из problem_desc)
  5. Описание ситуации из problem_desc
  6. Расчёт суммы возврата по ст. 9 ч. 2 Федерального закона № 214-ФЗ:
     Застройщик обязан вернуть цену договора и уплатить проценты за пользование денежными средствами в размере 1/150 ставки рефинансирования ЦБ РФ за каждый день использования:
     Цена договора: contract_price руб.
     Проценты: contract_price руб. × cb_rate% / 100 / 150 × calculated_days_used дн. = calculated_interest руб.
     Итого к возврату: calculated_total_return руб.
     Приведи именно этот расчёт с подстановкой всех конкретных цифр.
  7. Требование: в течение 20 рабочих дней со дня получения настоящего уведомления перечислить calculated_total_return руб. на банковские реквизиты: [банк, БИК, р/с, к/с — укажи в квадратных скобках, так как эти данные не были предоставлены]
  8. Настоящий договор считается расторгнутым со дня направления дольщиком настоящего уведомления (ст. 9 ч. 4 ФЗ-214)
  9. При неудовлетворении — иск в суд; помимо суммы возврата и процентов будут взысканы: штраф 50% (ЗоЗПП ст. 13 ч. 6), компенсация морального вреда, судебные расходы
  10. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: реквизиты ДДУ, адрес квартиры, цену договора, дату оплаты.
  Укажи основание расторжения и со ссылкой на ФЗ-214 ст. 9 объясни право дольщика расторгнуть договор.
  Используй только данные из формы.

wizard_steps:
  - title: "Застройщик"
    fields:
      - id: developer_name
        type: text
        label: "Наименование застройщика"
        placeholder: "ООО «СтройГрупп»"
        required: true
      - id: developer_address
        type: text
        label: "Юридический адрес застройщика"
        placeholder: "г. Москва, ул. Строителей, д. 1"
        hint: "Найдите в ДДУ или на сайте застройщика"
  - title: "Договор"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес квартиры (объекта ДДУ)"
        placeholder: "г. Москва, ул. Новая, д. 15, кв. 42"
        required: true
      - id: contract_number
        type: text
        label: "Номер ДДУ"
        placeholder: "№ 123/2022-ДДУ"
        required: true
      - id: contract_date
        type: date
        label: "Дата заключения ДДУ"
        required: true
      - id: contract_price
        type: number
        label: "Цена договора (ДДУ), ₽"
        placeholder: "5000000"
        required: true
      - id: payment_date
        type: date
        label: "Дата оплаты по ДДУ"
        required: true
        hint: "Дата, когда вы перечислили деньги застройщику"
  - title: "Основание расторжения"
    fields:
      - id: termination_reason
        type: radio
        label: "По какой причине вы расторгаете ДДУ"
        required: true
        options:
          - value: delay_2months
            label: "Застройщик задержал передачу более чем на 2 месяца"
          - value: defects_major
            label: "Существенные строительные недостатки"
          - value: construction_stopped
            label: "Строительство остановлено или заморожено"
          - value: other
            label: "Другое основание"
      - id: cb_rate
        type: number
        label: "Ключевая ставка ЦБ РФ, %"
        placeholder: "21"
        required: true
        hint: "На дату направления требования. Актуальную ставку смотрите на сайте cbr.ru"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Дом должны были сдать в марте 2024, но строительство остановилось ещё в 2023"
        required: true

legal_refs:
  - law: "ФЗ-214 ст. 9 — расторжение ДДУ дольщиком в одностороннем порядке"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  - law: "ФЗ-214 ст. 6 — нарушение срока передачи как основание расторжения"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  - law: "ЗоЗПП ст. 13 — штраф 50% за неисполнение в добровольном порядке"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
