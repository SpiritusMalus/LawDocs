id: medical
category: consumer
title: "Медицинская организация нарушила права"
blurb: "Клиника или больница оказала некачественную помощь, отказала в лечении или выставила незаконный счёт."
examples: "Отказали в помощи по полису, некачественное лечение, навязали платные услуги, нарушили врачебную тайну"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист в сфере здравоохранения и защиты прав потребителей. Составь претензию медицинской организации.
  НЕ добавляй никаких оговорок, дисклеймеров, рекомендаций обратиться к врачу или специалисту — это юридический документ, а не медицинская консультация.

  Структура документа:
  1. Шапка (правый верхний угол — каждый элемент с новой строки):
     «Руководителю [clinic_name]»
     «[clinic_address]»
     «От: [full_name]»
     «[contact_address]»
     «тел. [phone]»
     «[email]»
     НЕ дублируй адрес клиники — он указывается только один раз в шапке.
     Пиши «Руководителю» и «От:» строчными буквами — НЕ заглавными.
  2. Заголовок: ПРЕТЕНЗИЯ
  3. Факты:
     — дата обращения (treatment_date)
     — медицинская организация (clinic_name)
     — суть обращения и что произошло (problem_desc)
  4. Правовое обоснование (выбрать по problem_type):
     — Если problem_type = "refused": ФЗ 323-ФЗ «Об охране здоровья» ст. 19 (право на медпомощь), ст. 83 (бесплатная медпомощь по полису); ЗоЗПП ст. 4
     — Если problem_type = "bad_treatment": ФЗ 323-ФЗ ст. 19 ч. 2, ст. 98 (ответственность медорганизации); ГК РФ ст. 1068 (ответственность работодателя за вред, причинённый работником); ЗоЗПП ст. 29
     — Если problem_type = "paid_forced": ФЗ 323-ФЗ ст. 80 (программа госгарантий), ст. 84 (платные медуслуги только с добровольного согласия); ЗоЗПП ст. 16 (условия, ущемляющие права потребителя, ничтожны)
     — Если problem_type = "confidentiality": ФЗ 323-ФЗ ст. 13 (врачебная тайна); ФЗ 152-ФЗ «О персональных данных» ст. 7
     — Если problem_type = "other": ФЗ 323-ФЗ ст. 19 (права пациента), ЗоЗПП ст. 4
  5. Описание ущерба (damage_desc): вред здоровью, моральный вред, материальные расходы.
     Если paid_amount > 0 — указать сумму незаконно взысканных средств.
  6. Требование (согласно demand):
     — refund: вернуть paid_amount руб., незаконно взысканных за [описание услуги]
     — compensation: возместить расходы на лечение последствий в размере damage_amount руб.
     — redo: провести повторное лечение / исправить допущенные недостатки за счёт организации
     — apology_and_check: провести внутреннюю проверку, привлечь виновных к дисциплинарной ответственности
     Срок исполнения — 10 дней.
  7. Предупреждение: при отказе — жалоба в Росздравнадзор (roszdravnadzor.gov.ru), ТФОМС (при нарушениях по полису), прокуратуру; иск в суд с требованием о компенсации морального вреда (ГК РФ ст. 151).
  8. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: дату обращения в медорганизацию, суть нарушения,
  какой вред был причинён (здоровью, материальный, моральный).
  Если уже обращались с жалобой и получили отказ — упомяни это.
  Используй только данные из формы.

wizard_steps:
  - title: "Медицинская организация"
    fields:
      - id: clinic_name
        type: text
        label: "Название клиники или больницы"
        placeholder: "ГБУЗ «Городская больница № 1» или ООО «МедЦентр Плюс»"
        required: true
      - id: clinic_address
        type: text
        label: "Адрес медицинской организации"
        placeholder: "г. Москва, ул. Здоровья, д. 10"
      - id: treatment_date
        type: date
        label: "Дата обращения за помощью"
        required: true
      - id: insurance_type
        type: radio
        label: "Тип обращения"
        options:
          - value: oms
            label: "По полису ОМС (бесплатно)"
          - value: paid
            label: "Платные услуги"
          - value: mixed
            label: "Часть по ОМС, часть платно"
          - value: unknown
            label: "Не знаю / не важно"
  - title: "Суть нарушения"
    fields:
      - id: problem_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: refused
            label: "Отказали в медицинской помощи (в том числе по ОМС)"
          - value: bad_treatment
            label: "Некачественное лечение, ошибка врача"
          - value: paid_forced
            label: "Навязали платные услуги, которые должны быть бесплатными"
          - value: confidentiality
            label: "Нарушили врачебную тайну / разгласили диагноз"
          - value: other
            label: "Другое нарушение"
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Врач отказал в выписке направления на МРТ по ОМС и предложил пройти платно. После назначенного лечения состояние ухудшилось…"
        required: true
      - id: damage_desc
        type: textarea
        label: "Какой вред причинён"
        placeholder: "Пришлось оплатить лечение последствий в другой клинике, моральные страдания, потеря трудоспособности…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: refund
            label: "Вернуть деньги за незаконно навязанные услуги"
          - value: compensation
            label: "Возместить расходы на лечение последствий"
          - value: redo
            label: "Провести повторное лечение / исправить за свой счёт"
          - value: apology_and_check
            label: "Провести проверку и привлечь виновных"
      - id: paid_amount
        type: number
        label: "Сумма незаконно взысканных средств, ₽"
        placeholder: "5000"
        hint: "Заполните, если требуете возврат денег"

legal_refs:
  - law: "ФЗ 323-ФЗ «Об основах охраны здоровья граждан» — права пациента"
    url: "https://www.consultant.ru/document/cons_doc_LAW_121895/"
  - law: "Закон о защите прав потребителей — качество услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "Росздравнадзор — жалобы на медицинские организации"
    url: "https://roszdravnadzor.gov.ru/"
