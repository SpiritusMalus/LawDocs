id: utility
category: housing
title: "Управляющая компания / ЖКХ"
blurb: "Лишние начисления, перерасчёт, невыполнение обязательств."
examples: "Перерасчёт за некачественные услуги, оспаривание долга, протечки"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по жилищному праву. Составь претензию в управляющую компанию или ТСЖ.

  Шапка: «Руководителю [company_name]» / «От: [full_name], [apartment_address], [phone], [email]»
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после.
  Описание: характер нарушения (problem_desc), период (violation_period если есть). НЕ начинай тело документа с повторения адреса из шапки — адрес уже указан в шапке.
  Правовое обоснование — включи нормы, соответствующие violation_type:
     - Если violation_type=overcharge: ЖК РФ ст. 157, Постановление Правительства №354 (правила расчёта коммунальных услуг), ЗоЗПП ст. 16
     - Если violation_type=poor_service: Постановление Правительства №354 (раздел об ответственности за качество), ЖК РФ ст. 161 ч. 2.3
     - Если violation_type=no_repair: Постановление Правительства №491 (минимальный перечень работ по содержанию общего имущества), ЖК РФ ст. 161, КоАП ст. 7.22 (штраф для УК за нарушение правил содержания)
     - В любом случае включить: ЖК РФ ст. 161 (обязанность УК надлежащего содержания)
  Если указана disputed_amount — рассчитай перерасчёт и укажи итоговую сумму к возврату. Если disputed_amount не указан — перечисли допущенные нарушения по пунктам.
  Требование: произвести перерасчёт / устранить нарушения в течение 30 дней
  При неисполнении — жалоба в ГЖИ, прокуратуру, иск в суд

ai_narrative_prompt: |
  Опиши на юридическом языке: характер нарушения УК, период, сумму переплаты или описание дефекта.
  Используй только данные из формы.

wizard_steps:
  - title: "УК / ТСЖ и адрес"
    fields:
      - id: company_name
        type: text
        label: "Название УК или ТСЖ"
        placeholder: "ООО «УК Комфорт»"
        required: true
      - id: company_address
        type: text
        label: "Адрес УК (офис, если знаете)"
        placeholder: "г. Москва, ул. Ленина, 2"
      - id: apartment_address
        type: text
        label: "Адрес вашей квартиры"
        placeholder: "г. Москва, ул. Пушкина, д. 10, кв. 5"
        required: true
  - title: "Что случилось"
    fields:
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: overcharge
            label: "Лишние начисления / завышенные тарифы"
          - value: poor_service
            label: "Некачественные коммунальные услуги"
          - value: no_repair
            label: "Отказывают делать ремонт общего имущества"
          - value: other
            label: "Другое"
      - id: violation_period
        type: text
        label: "Период нарушения"
        placeholder: "Январь–март 2025"
      - id: problem_desc
        type: textarea
        label: "Опишите проблему"
        placeholder: "Что именно происходит, сколько раз обращались"
        required: true
      - id: disputed_amount
        type: number
        label: "Сумма к перерасчёту, ₽ (если известна)"
        placeholder: "3200"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: recalculate
            label: "Произвести перерасчёт"
          - value: fix
            label: "Устранить нарушения"
          - value: both
            label: "И перерасчёт, и устранить нарушения"

legal_refs:
  - law: "Жилищный кодекс РФ (ст. 161 — требования к УК)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
  - law: "Постановление Правительства №354 (коммунальные услуги и перерасчёт)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_123668/"
