id: bank
category: banking
title: "Банк списал лишнее"
blurb: "Незаконные комиссии, навязанная страховка, блокировка счёта по 115-ФЗ."
examples: "Возврат страховки за период охлаждения, разблокировка, перерасчёт"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: bank_name
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по банковскому праву и защите прав потребителей. Составь претензию/заявление в банк.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
