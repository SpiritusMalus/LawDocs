id: shop
category: consumer
title: "Магазин не возвращает деньги"
blurb: "Купили товар, он сломался или не подошёл — продавец отказывает в возврате."
examples: "Товар ненадлежащего качества, отказ в возврате в 14 дней, навязанные услуги"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: store_name
  - field: store_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# все секции рендерит calculate_shop (нет narrative_fields — 0 LLM-вызовов).
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  [calculated_legal_section]

  [calculated_penalty_section]

  [calculated_demand_section]

narrative_fields: []

wizard_steps:
  - title: "Магазин и покупка"
    fields:
      - id: store_name
        type: text
        label: "Название магазина"
        placeholder: "М.Видео, DNS, Спортмастер…"
        required: true
      - id: store_address
        type: text
        label: "Адрес магазина или сайт"
        placeholder: "ул. Ленина, 1 или www.mvideo.ru"
      - id: product_name
        type: text
        label: "Что купили"
        placeholder: "Смартфон Samsung Galaxy S24"
        required: true
      - id: product_price
        type: number
        label: "Стоимость, ₽"
        placeholder: "35000"
        required: true
      - id: purchase_date
        type: date
        label: "Дата покупки"
        required: true
  - title: "Что случилось"
    fields:
      - id: problem_type
        type: radio
        label: "Тип проблемы"
        required: true
        options:
          - value: defect
            label: "Товар оказался некачественным / сломался"
          - value: return14
            label: "Отказывают в возврате в 14-дневный срок"
          - value: warranty
            label: "Проблема с гарантийным ремонтом"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите подробнее"
        placeholder: "Что именно сломалось или в чём отказывают"
        required: true
      - id: appeal_date
        type: date
        label: "Когда обратились в магазин"
      - id: store_response
        type: textarea
        label: "Что ответил магазин"
        placeholder: "Отказали, сославшись на…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: refund
            label: "Вернуть деньги"
          - value: replace
            label: "Заменить товар"
          - value: repair
            label: "Провести гарантийный ремонт"
          - value: other
            label: "Другое"
      - id: penalty_start_date
        type: date
        label: "Дата начала неустойки"
        hint: "Обычно — дата отказа магазина или дата обращения"

legal_refs:
  - law: "ЗоЗПП ст. 18 — права при обнаружении недостатков товара (замена, ремонт, возврат)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/76ae101b731ecc22467fd9f1f14cb9e2b8799026/"
  - law: "ЗоЗПП ст. 25 — обмен товара надлежащего качества в течение 14 дней"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/07e266c138f7d30d498ff235626083e75b770ff3/"
  - law: "ЗоЗПП ст. 19, 20 — сроки предъявления требований и устранения недостатков"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/2c9918ca490dc2eb68bb07347485443dc898183f/"
  - law: "ГК РФ ст. 475 — последствия передачи товара ненадлежащего качества"
    url: "https://www.consultant.ru/document/cons_doc_LAW_9027/17c385541834fe9a0d0996c1da3f0df8816438d0/"
  - law: "ПП РФ №2463 — Правила продажи товаров (перечень невозвратных товаров)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_373622/e4ca7557c9ce6273af99d42c900e8579841fe652/"

legal_refs_by_branch:
  problem_type:defect:
    - law: "ЗоЗПП ст. 18 ч. 1 — права потребителя при обнаружении существенного недостатка"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/76ae101b731ecc22467fd9f1f14cb9e2b8799026/"
    - law: "ЗоЗПП ст. 19 — сроки предъявления требований по недостаткам (гарантийный срок)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/2c9918ca490dc2eb68bb07347485443dc898183f/"
  problem_type:return14:
    - law: "ЗоЗПП ст. 25 — обмен/возврат товара надлежащего качества в течение 14 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/07e266c138f7d30d498ff235626083e75b770ff3/"
    - law: "ПП РФ №2463 — перечень невозвратных товаров надлежащего качества"
      url: "https://www.consultant.ru/document/cons_doc_LAW_373622/e4ca7557c9ce6273af99d42c900e8579841fe652/"
  problem_type:warranty:
    - law: "ЗоЗПП ст. 18 ч. 6 — при существенном недостатке — возврат в течение срока службы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/76ae101b731ecc22467fd9f1f14cb9e2b8799026/"
    - law: "ЗоЗПП ст. 20 — устранение недостатков в срок не более 45 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/c771be122fddbc6e3087cbf43aa39a85a960a296/"
  problem_type:other:
    - law: "ГК РФ ст. 475 — последствия передачи товара ненадлежащего качества"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/17c385541834fe9a0d0996c1da3f0df8816438d0/"
  demand:refund:
    - law: "ЗоЗПП ст. 22 — срок удовлетворения требования о возврате (10 дней)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/00616d1e160d7ff7ac8d5a6a8e4525fb75e3b486/"
  demand:replace:
    - law: "ЗоЗПП ст. 21 — срок замены товара (7 дней, до 20 дней при проверке)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/6dd6c070a38a1de71282c1f0206c1d9131d7446c/"
  demand:repair:
    - law: "ЗоЗПП ст. 20 — срок устранения недостатков: по соглашению, но не более 45 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/c771be122fddbc6e3087cbf43aa39a85a960a296/"
  demand:other:
    - law: "ЗоЗПП ст. 13 — штраф 50% за отказ удовлетворить требование добровольно"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/5311cc4c47a088e5ebc6a23b15f59fa70221f8ce/"
