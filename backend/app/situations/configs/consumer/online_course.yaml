id: online_course
category: consumer
title: "Онлайн-школа не возвращает деньги"
blurb: "Заплатили за онлайн-курс, он не подошёл или вы передумали — школа отказывает в возврате."
examples: "Отказ вернуть за курс до начала обучения, удержание сверх фактических занятий, курс не соответствует описанию"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по защите прав потребителей. Составь претензию онлайн-школе (образовательной организации) о возврате денежных средств за платные образовательные услуги.

  Структура документа:
  1. Шапка: «Руководителю [school_name]» / «От: [ФИО], [адрес], [телефон], [email]»
  2. Заголовок: ПРЕТЕНЗИЯ о возврате денежных средств за платные образовательные услуги
  3. Описание: школа (school_name), курс (course_name), стоимость (course_price руб.). Если указана contract_date — дата заключения договора / оплаты.
  4. Правовое обоснование:
     — ФЗ от 29.12.2012 №273-ФЗ «Об образовании в Российской Федерации» ст. 54 ч. 2: договор об оказании платных образовательных услуг предусматривает права и обязанности сторон; при расторжении — расчёт за фактически оказанные услуги
     — Постановление Правительства РФ от 15.09.2020 №1563 «Об утверждении Правил оказания платных образовательных услуг» п. 24: при расторжении договора исполнитель возвращает уплаченные средства за вычетом стоимости фактически оказанных услуг; фактические расходы должны быть документально подтверждены
     — ЗоЗПП ст. 32: потребитель вправе отказаться от исполнения договора об оказании услуг в любое время при условии оплаты исполнителю фактически понесённых им расходов
     — ЗоЗПП ст. 28 ч. 5: нарушение срока возврата денег → неустойка 3% от суммы долга за каждый день просрочки (срок возврата — 10 дней по общему правилу)
     — ЗоЗПП ст. 13 ч. 6: штраф 50% от присуждённой суммы при отказе исполнить требование добровольно (при обращении в суд)
  5. Если problem_type = not_started: указать, что обучение не началось, занятия не проводились; фактических расходов у исполнителя нет, оснований для удержания средств не имеется; требуется полный возврат course_price руб.
  6. Если problem_type = partial: указать, что часть услуг уже оказана; возврату подлежит стоимость неоказанных услуг; запросить у школы детализацию фактически понесённых расходов с подтверждающими документами.
  7. Если problem_type = quality: указать, что услуга не соответствует условиям договора и/или публичному описанию курса (нарушение ст. 29 ЗоЗПП).
  8. Если указана refund_request_date: «[refund_request_date] я направил(а) в [school_name] запрос о возврате денежных средств, который остался без удовлетворения. Неустойка 3%/день начисляется с указанной даты.»
  9. Сумма к возврату: если указан claimed_amount — claimed_amount руб.; если нет и problem_type = not_started — полная сумма course_price руб.
  10. Требование: вернуть средства в течение 10 дней с даты получения настоящей претензии
  11. При отказе — иск в суд; взыскание суммы долга, неустойки 3%/день, морального вреда, штрафа 50%, судебных расходов
  12. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: название онлайн-школы, название курса, стоимость, когда была произведена оплата.
  Укажи, на каком этапе подаётся претензия (до начала обучения, в процессе или по причине ненадлежащего качества) и почему требуется возврат.
  Если уже был запрос на возврат — укажи дату и реакцию школы.
  Используй только данные из формы.

wizard_steps:
  - title: "Школа и курс"
    fields:
      - id: school_name
        type: text
        label: "Название онлайн-школы"
        placeholder: "Skillbox, Нетология, GeekBrains, Яндекс Практикум…"
        required: true
      - id: course_name
        type: text
        label: "Название курса"
        placeholder: "Веб-дизайн с нуля"
        required: true
      - id: contract_date
        type: date
        label: "Дата оплаты / заключения договора"
      - id: course_price
        type: number
        label: "Стоимость курса, ₽"
        placeholder: "90000"
        required: true
  - title: "Что случилось"
    fields:
      - id: problem_type
        type: radio
        label: "Ситуация"
        required: true
        options:
          - value: not_started
            label: "Обучение ещё не началось"
          - value: partial
            label: "Прошёл часть курса, хочу вернуть за оставшееся"
          - value: quality
            label: "Курс не соответствует описанию / плохое качество"
          - value: other
            label: "Другое"
      - id: refund_request_date
        type: date
        label: "Когда обратились в школу с запросом на возврат"
        hint: "С этой даты считается неустойка 3%/день при просрочке"
      - id: claimed_amount
        type: number
        label: "Сумма к возврату, ₽"
        placeholder: "60000"
        hint: "Оставьте пустым, если хотите вернуть полную стоимость курса"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что произошло, что ответила школа на ваш запрос о возврате"
        required: true

legal_refs:
  - law: "ФЗ №273-ФЗ «Об образовании в РФ» ст. 54 — договор об образовании"
    url: "https://www.consultant.ru/document/cons_doc_LAW_140174/"
  - law: "Постановление Правительства РФ №1563 — Правила платных образовательных услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_363073/"
  - law: "ЗоЗПП ст. 28, 32 — отказ от услуги, нарушение срока возврата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
