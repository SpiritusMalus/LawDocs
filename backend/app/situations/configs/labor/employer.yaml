id: employer
category: labor
title: "Работодатель не выплатил"
blurb: "Не выдают зарплату, расчёт при увольнении, компенсацию за отпуск."
examples: "Задержка зарплаты, недоплата, серая часть, расчёт при увольнении"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: company_name
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из additional_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши дополнительные обстоятельства дела
  официально-деловым стилем, исправь орфографические и грамматические ошибки.
  Не упоминай суммы компенсации и расчёт — они будут указаны отдельно.
  Не упоминай статьи законов — правовое обоснование подставляется отдельно.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - additional_desc

wizard_steps:
  - title: "Работодатель"
    fields:
      - id: company_name
        type: text
        label: "Название организации"
        placeholder: "ООО «Ромашка»"
        required: true
      - id: company_inn
        type: text
        label: "ИНН работодателя (если знаете)"
        placeholder: "7712345678"
      - id: director_name
        type: text
        label: "ФИО директора (если знаете)"
        placeholder: "Петров Пётр Петрович"
      - id: company_address
        type: text
        label: "Адрес организации"
        placeholder: "г. Москва, ул. Ленина, 1"
  - title: "Трудовые отношения"
    fields:
      - id: position
        type: text
        label: "Ваша должность"
        placeholder: "Менеджер по продажам"
        required: true
      - id: hire_date
        type: date
        label: "Дата приёма на работу"
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: salary_delay
            label: "Задержка зарплаты"
          - value: underpayment
            label: "Недоплата / неполный расчёт"
          - value: dismissal
            label: "Незаконное увольнение"
          - value: vacation
            label: "Не выплатили отпускные / компенсацию"
          - value: other
            label: "Другое"
      - id: debt_amount
        type: number
        label: "Сумма долга, ₽"
        placeholder: "75000"
        required: true
      - id: debt_period
        type: text
        label: "За какой период"
        placeholder: "Январь–март 2025"
      - id: last_payment_date
        type: date
        label: "Дата последней выплаты"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: pay_debt
            label: "Выплатить долг и компенсацию"
          - value: reinstate
            label: "Восстановить на работе"
          - value: other
            label: "Другое"
      - id: additional_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Что важно учесть при составлении претензии"

legal_refs:
  - law: "ТК РФ ст. 136, 140, 236 — сроки выплаты зарплаты, расчёт при увольнении, компенсация за задержку"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34683/a0a891ee650687026ef53d5d1194983419be6793/"
  - law: "ТК РФ ст. 353, 356 — полномочия Государственной инспекции труда (ГИТ)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34683/265520162b097e1af18964074ba9f78890b2e681/"
  - law: "ТК РФ ст. 127 — компенсация за неиспользованный отпуск при увольнении"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34683/2f173da324a5464ef649b88f7347b8a17d200dae/"
  - law: "УК РФ ст. 145.1 — уголовная ответственность за невыплату зарплаты свыше 2 месяцев"
    url: "https://www.consultant.ru/document/cons_doc_LAW_10699/37fd891311615f23654aa2bd69d386fc6c0c8470/"

legal_refs_by_branch:
  violation_type:dismissal:
    - law: "ТК РФ ст. 81 — основания расторжения трудового договора по инициативе работодателя"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/6a7ba42d8fda3a1ba186a9eb5c806921998ae7d1/"
    - law: "ТК РФ ст. 394 — восстановление на работе и компенсация за вынужденный прогул"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/866dec528c62e132ee3463fa0814d217434849b0/"
  violation_type:salary_delay:
    - law: "ТК РФ ст. 236 — денежная компенсация за задержку зарплаты (1/150 ставки ЦБ в день)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/7c8d2fe49f0c8b8d13723803f2e82228f99b6d7e/"
    - law: "ТК РФ ст. 142 — право работника приостановить работу при задержке свыше 15 дней"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/67f5b7767847d2483a67262f342f35cf922855a2/"
  violation_type:underpayment:
    - law: "ТК РФ ст. 135 — порядок установления заработной платы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/ec0a7a4cf2bbf1f8f89970fd480c3fc9ed860f82/"
    - law: "ТК РФ ст. 236 — компенсация за задержку или недоплату части заработной платы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/7c8d2fe49f0c8b8d13723803f2e82228f99b6d7e/"
  violation_type:vacation:
    - law: "ТК РФ ст. 114, 122 — ежегодный оплачиваемый отпуск и порядок его предоставления"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/cfa9a86846908928276ee2f2274d3d4a0a6c8640/"
    - law: "ТК РФ ст. 124 — запрет на непредоставление отпуска более двух лет подряд"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/5096118a0d71c28f406acf6275cd6c1c36efe705/"
  violation_type:other:
    - law: "ТК РФ ст. 21 — основные права работника"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/b94bd4dad3b39d0497eb33b8fc3d99356959c2da/"
  demand:pay_debt:
    - law: "ТК РФ ст. 236 — работодатель обязан выплатить долг с процентами за каждый день задержки"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/7c8d2fe49f0c8b8d13723803f2e82228f99b6d7e/"
  demand:reinstate:
    - law: "ТК РФ ст. 394 — немедленное исполнение решения суда о восстановлении на работе"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/866dec528c62e132ee3463fa0814d217434849b0/"
  demand:other:
    - law: "ТК РФ ст. 237 — компенсация морального вреда за нарушение трудовых прав"
      url: "https://www.consultant.ru/document/cons_doc_LAW_34683/aa46013b20309f1679e45f48b21c6ebc37da6e22/"
