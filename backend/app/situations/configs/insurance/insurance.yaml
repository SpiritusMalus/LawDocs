id: insurance
category: insurance
title: "Страховая занизила выплату"
blurb: "ОСАГО или КАСКО — оценили ущерб ниже реального или отказали."
examples: "Занижение по ОСАГО, отказ в страховом случае, доплата по экспертизе"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Генеральному директору"
    field: insurance_company
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: юр-секции рендерит calculate_insurance детерминированно,
# а описание клиента (incident_desc) перефразирует LLM в {{llm_narrative}} —
# официально-деловым стилем, без мата/эмоций.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_underpayment_section]

  [calculated_penalty_section]

  [calculated_demand_section]

narrative_fields:
  - incident_desc

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–4 предложения) изложи обстоятельства страхового
  случая официально-деловым стилем: что произошло и позиция страховой компании.
  Убери мат, эмоции, просторечия и оскорбления — оставь только сухие факты.
  Исправь орфографию и грамматику. Не упоминай суммы и расчёт — они указываются
  отдельно. Не выдумывай факты, используй только данные клиента.

wizard_steps:
  - title: "Страховая и полис"
    fields:
      - id: insurance_company
        type: text
        label: "Страховая компания"
        placeholder: "РЕСО, Согаз, Альфастрахование…"
        required: true
      - id: policy_type
        type: radio
        label: "Тип полиса"
        required: true
        options:
          - value: osago
            label: "ОСАГО"
          - value: kasko
            label: "КАСКО"
          - value: other
            label: "Другой вид страхования"
      - id: policy_number
        type: text
        label: "Номер полиса"
        placeholder: "XXX 1234567890"
  - title: "Страховой случай"
    fields:
      - id: incident_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: underestimate
            label: "Занизили сумму выплаты"
          - value: refusal
            label: "Отказали в страховой выплате"
          - value: delay
            label: "Нарушили срок выплаты (более 20 раб. дней)"
      - id: incident_date
        type: date
        label: "Дата ДТП / страхового события"
        required: true
      - id: incident_desc
        type: textarea
        label: "Опишите обстоятельства"
        placeholder: "Что произошло, кто виновник (для ОСАГО)"
        required: true
  - title: "Суммы и требование"
    fields:
      - id: actual_damage
        type: number
        label: "Реальный ущерб по экспертизе, ₽"
        placeholder: "180000"
      - id: paid_amount
        type: number
        label: "Страховая выплатила, ₽"
        placeholder: "90000"
        hint: "0 — если отказали полностью"
      - id: overdue_days
        type: number
        label: "Дней просрочки (если есть)"
        placeholder: "45"
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: pay_difference
            label: "Доплатить разницу и неустойку"
          - value: full_payment
            label: "Выплатить полную сумму (при отказе)"
          - value: other
            label: "Другое"

