upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name law-docs.ru www.law-docs.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name law-docs.ru www.law-docs.ru;

    ssl_certificate /etc/letsencrypt/live/law-docs.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/law-docs.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP "";
    }

    # Health check для UptimeRobot — без лишних заголовков
    location = /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP "";
        access_log off;
    }

    # ЮKassa вебхук идёт напрямую в бэкенд, чтобы X-Real-IP содержал реальный IP ЮKassa
    location /api/v1/webhooks/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP "";
        proxy_read_timeout 60s;
    }

    location /ym-ru/ {
        proxy_pass https://mc.yandex.ru/;
        proxy_ssl_server_name on;
        resolver 8.8.8.8 valid=300s;
        proxy_set_header Host mc.yandex.ru;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types *;
        sub_filter 'mc.yandex.ru' 'law-docs.ru/ym-ru';
        sub_filter 'mc.yandex.com' 'law-docs.ru/ym-com';
    }

    location /ym-com/ {
        proxy_pass https://mc.yandex.com/;
        proxy_ssl_server_name on;
        resolver 8.8.8.8 valid=300s;
        proxy_set_header Host mc.yandex.com;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP "";
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
