id: tour_operator
category: consumer
title: "Туроператор не вернул деньги за тур"
blurb: "Туроператор или агентство отменили тур, изменили условия или не возвращают предоплату."
examples: "Отмена тура, существенное изменение гостиницы или дат, отказ в возврате денег"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: tour_operator
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по защите прав потребителей в сфере туризма. Составь претензию туроператору (туристическому агентству) о возврате денежных средств.
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после.
  Описание: туроператор (tour_operator), направление (trip_destination), дата вылета (departure_date), стоимость тура (tour_price руб.). Если указан contract_number — ссылка на договор №contract_number.
  Правовое обоснование:
     — Если violation_type = operator_cancelled или changed_conditions:
       ФЗ от 24.11.1996 №132-ФЗ «Об основах туристской деятельности в Российской Федерации» ст. 10: при существенном изменении обстоятельств (в том числе невозможность совершения тура по вине туроператора, изменение условий путешествия) турист вправе отказаться от тура и получить полный возврат уплаченных средств.
       ФЗ №132-ФЗ ст. 10.1: туроператор обязан вернуть денежные средства за тур в течение 10 дней с момента предъявления требования.
     — Если violation_type = refund_denied или voluntary_refusal:
       ЗоЗПП ст. 32 и ГК РФ ст. 782: потребитель вправе отказаться от исполнения договора об оказании услуг в любое время при условии оплаты исполнителю фактически понесённых им расходов. Фактические расходы должны быть документально подтверждены; удержание без подтверждения расходов незаконно.
     — ЗоЗПП ст. 28 ч. 5: нарушение срока возврата → неустойка 3% от суммы долга за каждый день просрочки
     — ЗоЗПП ст. 13 ч. 6: штраф 50% от присуждённой суммы при отказе удовлетворить требование добровольно (при обращении в суд)
  Описание ситуации из problem_desc
  Расчёт суммы к возврату: если refunded_amount > 0 — разница (tour_price − refunded_amount) руб.; если 0 — полная стоимость tour_price руб.
  Требование: вернуть денежные средства в течение 10 дней с даты получения претензии
  При отказе — иск в суд; взыскание суммы долга, неустойки 3%/день, морального вреда, штрафа 50%, судебных расходов
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
ai_narrative_prompt: |
  Опиши на юридическом языке: туроператора, направление, дату вылета, стоимость тура.
  Укажи, что именно произошло — отмена, изменение условий или отказ в возврате.
  Если уже получена частичная компенсация — укажи остаток к возврату.
  Используй только данные из формы.

wizard_steps:
  - title: "Туроператор и тур"
    fields:
      - id: tour_operator
        type: text
        label: "Название туроператора"
        placeholder: "TUI, Coral Travel, Pegas Touristik…"
        required: true
      - id: agency_name
        type: text
        label: "Турагентство (если покупали через посредника)"
        placeholder: "Агентство «Путешествие мечты»"
      - id: trip_destination
        type: text
        label: "Направление / страна"
        placeholder: "Турция, Анталья"
        required: true
      - id: departure_date
        type: date
        label: "Дата вылета по договору"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора (если есть)"
        placeholder: "ТУР-2025/456"
  - title: "Стоимость и ситуация"
    fields:
      - id: tour_price
        type: number
        label: "Стоимость тура, ₽"
        placeholder: "120000"
        required: true
      - id: refunded_amount
        type: number
        label: "Уже вернули, ₽ (0 — если ничего)"
        placeholder: "0"
        hint: "Введите 0, если деньги ещё не возвращали"
      - id: violation_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: operator_cancelled
            label: "Туроператор отменил тур"
          - value: changed_conditions
            label: "Существенно изменили условия (гостиница, сроки, маршрут)"
          - value: refund_denied
            label: "Отказываются возвращать деньги"
          - value: voluntary_refusal
            label: "Я сам отказался от тура"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что именно произошло, что говорит туроператор или агентство"
        required: true

legal_refs:
  - law: "ФЗ №132-ФЗ «Об основах туристской деятельности» ст. 10, 10.1"
    url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
  - law: "ЗоЗПП ст. 28, 32 — отказ от услуги, нарушение срока возврата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 782 — отказ от договора возмездного оказания услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
