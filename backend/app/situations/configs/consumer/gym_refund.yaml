id: gym_refund
category: consumer
title: "Фитнес-клуб не возвращает деньги"
blurb: "Хотите расторгнуть абонемент и вернуть деньги за неиспользованный период, но клуб отказывает."
examples: "Клуб закрылся или переехал, изменили условия, медицинские показания, просто передумали"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по защите прав потребителей. Составь претензию в фитнес-клуб с требованием возврата денег за неиспользованный период абонемента.

  Структура документа:
  1. Шапка: «Руководителю [club_name], [club_address]» / «От: [full_name], [contact_address], тел. [phone], [email]»
  2. Заголовок: ПРЕТЕНЗИЯ о возврате денежных средств за неиспользованные услуги
  3. Обстоятельства: дата приобретения абонемента (purchase_date), срок действия (subscription_period), стоимость (subscription_price руб.), дата обращения за возвратом (refund_request_date если указана).
  4. Обоснование по причине (reason):
     — Если "club_closed": клуб прекратил работу или существенно изменил место оказания услуг. По ст. 451 ГК РФ существенное изменение обстоятельств является основанием для расторжения договора с возвратом денег.
     — Если "terms_changed": клуб изменил условия договора (расписание, оборудование, инструкторы) в одностороннем порядке. По ЗоЗПП ст. 16 условия, ухудшающие положение потребителя, недействительны.
     — Если "medical": наличие медицинских противопоказаний к занятиям, подтверждённых документально. По ЗоЗПП ст. 32 потребитель вправе отказаться от услуг.
     — Если "voluntary": потребитель вправе в любое время отказаться от исполнения договора об оказании услуг, уплатив исполнителю только фактически понесённые им расходы (ст. 32 ЗоЗПП, ст. 782 ГК РФ).
  5. Расчёт суммы к возврату:
     — Если reason = "voluntary" или "medical": subscription_price / общее количество дней абонемента × количество неиспользованных дней = [сумма к возврату]. Если refund_amount указан пользователем — использовать его.
     — Если reason = "club_closed" или "terms_changed": возврату подлежит полная стоимость за неиспользованный период.
     Провести расчёт с конкретными цифрами.
  6. Требование: вернуть [сумма] руб. в течение 10 дней с момента получения претензии (ст. 31 ЗоЗПП).
  7. При нарушении срока возврата: неустойка 3% от суммы задолженности за каждый день просрочки (ст. 28 ч. 5 ЗоЗПП).
  8. При отказе — иск в суд; штраф 50% (ст. 13 ЗоЗПП), моральный вред, судебные расходы.
  9. Дата и подпись.

ai_narrative_prompt: |
  Опиши на юридическом языке: дату покупки абонемента, его срок и стоимость, причину отказа от услуг.
  Если клуб уже отказал в возврате — упомяни это и укажи, что отказ незаконен со ссылкой на ст. 32 ЗоЗПП.
  Укажи расчёт суммы к возврату (за неиспользованный период).
  Используй только данные из формы.

wizard_steps:
  - title: "Фитнес-клуб"
    fields:
      - id: club_name
        type: text
        label: "Название фитнес-клуба или сети"
        placeholder: "World Class, Фитнес Хаус, X-Fit, локальный клуб"
        required: true
      - id: club_address
        type: text
        label: "Адрес клуба"
        placeholder: "г. Москва, ул. Спортивная, д. 3"
  - title: "Абонемент"
    fields:
      - id: purchase_date
        type: date
        label: "Дата покупки абонемента"
        required: true
      - id: subscription_period
        type: text
        label: "Срок абонемента"
        placeholder: "12 месяцев, с 01.01.2026 по 31.12.2026"
        required: true
      - id: subscription_price
        type: number
        label: "Стоимость абонемента, ₽"
        placeholder: "30000"
        required: true
      - id: refund_request_date
        type: date
        label: "Когда обратились за возвратом"
        hint: "Дата вашего обращения в клуб с требованием вернуть деньги"
  - title: "Причина возврата"
    fields:
      - id: reason
        type: radio
        label: "Почему хотите вернуть деньги"
        required: true
        options:
          - value: club_closed
            label: "Клуб закрылся или переехал"
          - value: terms_changed
            label: "Клуб изменил условия (расписание, оборудование, инструкторы)"
          - value: medical
            label: "Медицинские противопоказания"
          - value: voluntary
            label: "Личное решение (передумал, переезд, нет времени)"
      - id: reason_desc
        type: textarea
        label: "Дополнительные подробности"
        placeholder: "Клуб перенёс занятия йогой в неудобное время, убрали бассейн…"
      - id: club_response
        type: radio
        label: "Что ответил клуб"
        required: true
        options:
          - value: refused
            label: "Отказали в возврате"
          - value: ignored
            label: "Игнорируют обращение"
          - value: not_contacted
            label: "Ещё не обращался(ась)"
      - id: refund_amount
        type: number
        label: "Ваша оценка суммы к возврату, ₽"
        hint: "Необязательно — рассчитаем пропорционально, если оставите пустым"

legal_refs:
  - law: "ЗоЗПП ст. 32 — право отказаться от услуги в любое время"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 782 — расторжение договора возмездного оказания услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ЗоЗПП ст. 28, 31 — неустойка и сроки возврата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
