id: rental_deposit
category: housing
title: "Арендодатель не возвращает залог"
blurb: "Сняли квартиру, внесли залог — после выезда хозяин отказывается его вернуть."
examples: "Незаконное удержание залога, надуманный ущерб, ссылка на обычный износ"
document_type: pretenziya
template_file: null

header_fields:
  - field: landlord_name
  - field: landlord_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из problem_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_wear_block]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  ситуации официально-деловым стилем, исправь орфографические и грамматические ошибки.
  Не упоминай размер залога и требуемые сроки — они будут указаны отдельно.
  Сохрани все факты из текста. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc

wizard_steps:
  - title: "Арендодатель и квартира"
    fields:
      - id: landlord_name
        type: text
        label: "ФИО арендодателя (хозяина)"
        placeholder: "Петров Пётр Петрович"
        required: true
      - id: landlord_address
        type: text
        label: "Адрес арендодателя для направления претензии"
        placeholder: "г. Москва, ул. Ленина, д. 1, кв. 2"
        hint: "Если не знаете — укажите адрес сданной квартиры"
      - id: apartment_address
        type: text
        label: "Адрес арендованной квартиры"
        placeholder: "г. Москва, ул. Пушкина, д. 10, кв. 5"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора аренды (если есть)"
        placeholder: "№ 12/2024"
  - title: "Период аренды и залог"
    fields:
      - id: move_in_date
        type: date
        label: "Дата въезда (начало аренды)"
        required: true
      - id: move_out_date
        type: date
        label: "Дата выезда (конец аренды)"
        required: true
      - id: deposit_amount
        type: number
        label: "Сумма залога, ₽"
        placeholder: "50000"
        required: true
      - id: deposit_reason
        type: radio
        label: "Почему арендодатель не возвращает залог"
        required: true
        options:
          - value: no_reason
            label: "Молчит, не объясняет причину"
          - value: damages_fake
            label: "Придумал ущерб, которого нет"
          - value: wear_normal
            label: "Ссылается на обычный износ квартиры"
          - value: debt_claimed
            label: "Говорит о задолженности по ЖКХ или аренде"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что говорит арендодатель, в каком состоянии была сдана квартира при выезде"
        required: true

legal_refs:
  - law: "ГК РФ ст. 381.1 — обеспечительный платёж"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 622 — возврат имущества при прекращении аренды"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 1102 — неосновательное обогащение"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"

legal_refs_by_branch:
  "deposit_reason:damages_fake":
    - law: "ГК РФ ст. 1064 — обязанность доказать факт и размер причинённого вреда"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "deposit_reason:wear_normal":
    - law: "ГК РФ ст. 616 — обязанности арендодателя по содержанию имущества (нормальный износ)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "deposit_reason:no_reason":
    - law: "ГК РФ ст. 1102 — неосновательное обогащение: возврат имущества без законных оснований"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
    - law: "ГК РФ ст. 622 — обязанность арендодателя вернуть залог при прекращении договора"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "deposit_reason:debt_claimed":
    - law: "ГК РФ ст. 310 — односторонний зачёт депозита в счёт долга требует обоснования"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
    - law: "ГК РФ ст. 410 — зачёт требований возможен только при соответствии условиям"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  "deposit_reason:other":
    - law: "ГК РФ ст. 1102 — возврат суммы залога как неосновательного обогащения"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
