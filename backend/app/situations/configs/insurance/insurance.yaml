id: insurance
category: insurance
title: "Страховая занизила выплату"
blurb: "ОСАГО или КАСКО — оценили ущерб ниже реального или отказали."
examples: "Занижение по ОСАГО, отказ в страховом случае, доплата по экспертизе"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Генеральному директору"
    field: insurance_company
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# все секции рендерит calculate_insurance (нет narrative_fields — 0 LLM-вызовов).
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  [calculated_legal_section]

  [calculated_underpayment_section]

  [calculated_penalty_section]

  [calculated_demand_section]

narrative_fields: []

wizard_steps:
  - title: "Страховая и полис"
    fields:
      - id: insurance_company
        type: text
        label: "Страховая компания"
        placeholder: "РЕСО, Согаз, Альфастрахование…"
        required: true
      - id: policy_type
        type: radio
        label: "Тип полиса"
        required: true
        options:
          - value: osago
            label: "ОСАГО"
          - value: kasko
            label: "КАСКО"
          - value: other
            label: "Другой вид страхования"
      - id: policy_number
        type: text
        label: "Номер полиса"
        placeholder: "XXX 1234567890"
  - title: "Страховой случай"
    fields:
      - id: incident_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: underestimate
            label: "Занизили сумму выплаты"
          - value: refusal
            label: "Отказали в страховой выплате"
          - value: delay
            label: "Нарушили срок выплаты (более 20 раб. дней)"
      - id: incident_date
        type: date
        label: "Дата ДТП / страхового события"
        required: true
      - id: incident_desc
        type: textarea
        label: "Опишите обстоятельства"
        placeholder: "Что произошло, кто виновник (для ОСАГО)"
        required: true
  - title: "Суммы и требование"
    fields:
      - id: actual_damage
        type: number
        label: "Реальный ущерб по экспертизе, ₽"
        placeholder: "180000"
      - id: paid_amount
        type: number
        label: "Страховая выплатила, ₽"
        placeholder: "90000"
        hint: "0 — если отказали полностью"
      - id: overdue_days
        type: number
        label: "Дней просрочки (если есть)"
        placeholder: "45"
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: pay_difference
            label: "Доплатить разницу и неустойку"
          - value: full_payment
            label: "Выплатить полную сумму (при отказе)"
          - value: other
            label: "Другое"

legal_refs:
  - law: "ГК РФ ст. 929 — договор имущественного страхования, обязанность выплаты"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ФЗ №4015-1 «Об организации страхового дела» ст. 10 — страховая выплата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_1307/"
  - law: "ФЗ-123 «О финансовом уполномоченном» — обязательный досудебный порядок (до 500 000 ₽)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_299392/"
  - law: "ЗоЗПП ст. 13 — штраф 50% за отказ исполнить требование добровольно"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ФЗ «Об ОСАГО» ст. 12, 16.1 — применяется при спорах по ОСАГО"
    url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"

legal_refs_by_branch:
  policy_type:kasko:
    - law: "ГК РФ ст. 930 — страхование имущества, страховой интерес"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
    - law: "ГК РФ ст. 932 — страхование ответственности по договору"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
    - law: "ГК РФ ст. 940 — форма договора страхования, страховой полис"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  policy_type:osago:
    - law: "ФЗ «Об ОСАГО» ст. 14.1 — прямое возмещение убытков через своего страховщика"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
  policy_type:other:
    - law: "ГК РФ ст. 929 — общие основания договора имущественного страхования"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  incident_type:underestimate:
    - law: "ФЗ «Об ОСАГО» ст. 12 ч. 13 — независимая экспертиза при несогласии с суммой выплаты"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
    - law: "ФЗ-123 ст. 20 — обращение к финомбудсмену при занижении выплаты до 500 000 ₽"
      url: "https://www.consultant.ru/document/cons_doc_LAW_299392/"
  incident_type:refusal:
    - law: "ФЗ-123 ст. 15 — обязательное обращение к финансовому омбудсмену до суда"
      url: "https://www.consultant.ru/document/cons_doc_LAW_299392/"
    - law: "ФЗ «Об ОСАГО» ст. 16.1 — досудебный порядок урегулирования при отказе в выплате"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
  incident_type:delay:
    - law: "ФЗ «Об ОСАГО» ст. 12 ч. 21 — неустойка 1% в день за просрочку выплаты"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
    - law: "ФЗ №4015-1 ст. 10 — сроки страховой выплаты (как правило, 10-20 рабочих дней)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_1307/"
