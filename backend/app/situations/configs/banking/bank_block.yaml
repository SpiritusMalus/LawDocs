id: bank_block
category: banking
title: "Банк заблокировал счёт по 115-ФЗ"
blurb: "Банк заморозил счёт или карту, ссылаясь на подозрительные операции или финансовый мониторинг."
examples: "Блокировка карты/счёта, запрос документов о происхождении средств, отказ в проведении операции"
document_type: zayavlenie
template_file: null

system_prompt: |
  Ты — юрист по банковскому праву. Составь заявление о снятии ограничений с банковского счёта/карты в банк.

  Структура документа:
  1. Шапка: «Руководителю [название банка]» / «От: [ФИО], [адрес], [телефон], [email]»
  2. Заголовок: ЗАЯВЛЕНИЕ о снятии ограничений с банковского счёта (карты)
  3. Описание: название банка (bank_name), номер счёта или карты (account_number — если указан), дата блокировки (violation_date), сумма заблокированных средств (amount — если указана), причина по версии банка (block_reason), уведомил ли банк письменно (bank_notification)
  4. Правовое обоснование:
     — ФЗ от 07.08.2001 №115-ФЗ ст. 7 ч. 5.2: банк обязан уведомить клиента об ограничении операций не позднее 5 рабочих дней и сообщить причины при наличии такой возможности
     — ФЗ №115-ФЗ ст. 7 ч. 13.1: клиент вправе представить в банк документы (сведения), подтверждающие законность происхождения денежных средств и характер операций
     — ФЗ №115-ФЗ ст. 7 ч. 13.2: банк обязан рассмотреть представленные документы и сообщить о принятом решении в течение 10 рабочих дней
     — ГК РФ ст. 845: банк обязан исполнять распоряжения клиента о перечислении и выдаче средств со счёта
     — ГК РФ ст. 856: за незаконное удержание денежных средств банк несёт ответственность в виде уплаты процентов (ст. 395 ГК РФ)
     — Если bank_notification = not_notified: подчеркнуть, что банк нарушил ст. 7 ч. 5.2 №115-ФЗ, не уведомив клиента в установленный срок
  5. Описание ситуации (problem_desc) — включить в основной текст
  6. Перечень прилагаемых документов:
     — Копия паспорта
     — Документы, подтверждающие законность происхождения средств и характер операций (договоры, выписки, справки о доходах, налоговые декларации и т.п.)
  7. Требование: снять ограничения в течение 10 рабочих дней с даты подачи настоящего заявления
  8. При отказе или бездействии — жалоба в Банк России (Интернет-приёмная на cbr.ru) и в Росфинмониторинг; при причинении убытков — иск в суд (ГК РФ ст. 856, 395)
  9. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: когда и какой счёт/карта были заблокированы, какую причину указал банк.
  Если bank_notification = not_notified — укажи нарушение ст. 7 ч. 5.2 №115-ФЗ (банк не уведомил клиента письменно).
  Если указана сумма заблокированных средств — включи её.
  Используй только данные из формы.

wizard_steps:
  - title: "Банк и счёт"
    fields:
      - id: bank_name
        type: text
        label: "Название банка"
        placeholder: "Сбербанк, ВТБ, Тинькофф…"
        required: true
      - id: account_number
        type: text
        label: "Номер счёта или последние цифры карты"
        placeholder: "40817810… или **** 1234"
      - id: violation_date
        type: date
        label: "Дата блокировки"
        required: true
      - id: amount
        type: number
        label: "Сумма заблокированных средств, ₽"
        placeholder: "150000"
        hint: "Укажите, если знаете точную сумму"
  - title: "Позиция банка"
    fields:
      - id: block_reason
        type: radio
        label: "Причина блокировки (по версии банка)"
        required: true
        options:
          - value: suspicious_operations
            label: "Подозрительные операции (без конкретики)"
          - value: source_of_funds
            label: "Не подтверждено происхождение средств"
          - value: 115fz_monitoring
            label: "Финансовый мониторинг / 115-ФЗ (общая формулировка)"
          - value: other
            label: "Другое / не объяснили"
      - id: bank_notification
        type: radio
        label: "Банк уведомил вас о блокировке письменно?"
        required: true
        options:
          - value: yes_notified
            label: "Да, прислали уведомление"
          - value: not_notified
            label: "Нет, не уведомили"
          - value: verbal
            label: "Только устно или через приложение/чат"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию подробнее"
        placeholder: "Что именно произошло, какие операции вызвали вопросы, что говорит банк"
        required: true

legal_refs:
  - law: "ФЗ от 07.08.2001 №115-ФЗ «О противодействии легализации доходов» (ст. 7)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_32834/"
  - law: "ГК РФ ст. 845, 856 — обязанности и ответственность банка"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "Интернет-приёмная Банка России"
    url: "https://www.cbr.ru/reception/"
