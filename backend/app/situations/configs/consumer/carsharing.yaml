id: carsharing
category: consumer
title: "Каршеринг предъявил необоснованный ущерб"
blurb: "Каршеринговая компания списала деньги за повреждения, которых вы не наносили, или завысила стоимость."
examples: "Яндекс.Драйв, BelkaCar, YouDrive, Delimobil — необоснованный ущерб, лишнее списание"
document_type: pretenziya
template_file: null

header_fields:
  - field: company_name
  - field: company_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из incident_desc + photo_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  официально-деловым стилем: дата поездки, что произошло, какую сумму требует каршеринг
  и почему пользователь с этим не согласен. Если есть фотодоказательства — упомяни.
  Исправь ошибки. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - incident_desc
  - photo_desc

wizard_steps:
  - title: "Каршеринг и поездка"
    fields:
      - id: company_name
        type: text
        label: "Каршеринговая компания"
        placeholder: "Яндекс.Драйв, BelkaCar, YouDrive, Делимобиль"
        required: true
      - id: company_address
        type: text
        label: "Юридический адрес компании"
        placeholder: "Найдите в пользовательском соглашении или на сайте"
      - id: trip_date
        type: date
        label: "Дата поездки"
        required: true
      - id: trip_location
        type: text
        label: "Место начала поездки"
        placeholder: "ул. Тверская, Москва"
      - id: car_plate
        type: text
        label: "Гос. номер автомобиля (если помните)"
        placeholder: "А123ВС 77"
      - id: order_id
        type: text
        label: "Номер заказа/поездки в приложении"
        placeholder: "TRP-12345678"
  - title: "Что произошло"
    fields:
      - id: violation_type
        type: radio
        label: "Суть претензии к каршерингу"
        required: true
        options:
          - value: preexisting_damage
            label: "Предъявили ущерб за повреждения, которые были до меня"
          - value: overcharge
            label: "Завысили стоимость ущерба"
          - value: unauthorized_charge
            label: "Списали деньги без объяснений"
          - value: other
            label: "Другое"
      - id: incident_desc
        type: textarea
        label: "Опишите ситуацию подробно"
        placeholder: "При возврате авто компания сообщила о царапине на бампере, которую я не наносил. До поездки в приложении не было фото этой части…"
        required: true
      - id: claimed_amount
        type: number
        label: "Сумма, которую каршеринг требует или уже списал, ₽"
        placeholder: "25000"
        required: true
  - title: "Доказательства"
    fields:
      - id: has_photo
        type: radio
        label: "Есть ли фотодоказательства (фото до/после поездки, скрины из приложения)"
        required: true
        options:
          - value: "yes"
            label: "Да, есть фото или скриншоты"
          - value: "no"
            label: "Нет, только мои слова"
      - id: photo_desc
        type: textarea
        label: "Опишите, что зафиксировано на фото (если есть)"
        placeholder: "Скрин из приложения при начале поездки — повреждений нет. Фото авто сразу после возврата."

legal_refs:
  - law: "ГК РФ ст. 401 — ответственность только при вине"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/94ebfa384dd37d9377ee7b78ab23c150ff69e5b4/"
  - law: "ГК РФ ст. 620 — право арендатора на досрочное расторжение при необговорённых недостатках"
    url: "https://www.consultant.ru/document/cons_doc_LAW_9027/a28d383ce0fc83410c7005826f649dee0efd4061/"
  - law: "ЗоЗПП ст. 10, 13, 14 — права потребителя услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/e96b1cbe2a0795305a08c97b1a7f34ddab4ae908/"

legal_refs_by_branch:
  violation_type:preexisting_damage:
    - law: "ГК РФ ст. 620 — арендатор вправе расторгнуть договор, если имущество имеет необговорённые недостатки"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/a28d383ce0fc83410c7005826f649dee0efd4061/"
    - law: "ГК РФ ст. 607 — акт приёма-передачи как доказательство состояния имущества"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/8795ca64fac9847b86743ee4c615a8a022cef84f/"
  violation_type:overcharge:
    - law: "ЗоЗПП ст. 16 — недействительность условий договора, ущемляющих права потребителя"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/9eb0f127ead4dc57e7d0a9d4954cf264c4b3cea8/"
    - law: "ЗоЗПП ст. 10 — обязанность предоставить полную информацию о цене услуги"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/e96b1cbe2a0795305a08c97b1a7f34ddab4ae908/"
  violation_type:unauthorized_charge:
    - law: "ГК РФ ст. 1102 — неосновательное обогащение, возврат незаконно списанных средств"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/49f09b23a7383f77a52746e03ffe821d13bd9b4e/"
    - law: "ЗоЗПП ст. 16 — запрет навязывать доп. услуги и недействительность ущемляющих условий"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/9eb0f127ead4dc57e7d0a9d4954cf264c4b3cea8/"
  violation_type:other:
    - law: "ГК РФ ст. 1064 — обязанность возместить причинённый вред"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/c511835e25e63740cf185038b1ad056526f814e9/"
  has_photo:"yes":
    - law: "ГПК РФ ст. 55 — фотоматериалы как доказательства по делу"
      url: "https://www.consultant.ru/document/cons_doc_LAW_39570/b48406042a309ee368f395fb6f3be1d43c7cbfc2/"
  has_photo:"no":
    - law: "ГК РФ ст. 401 — ответственность наступает только при наличии вины"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/94ebfa384dd37d9377ee7b78ab23c150ff69e5b4/"
