id: court_order
category: legal
title: "Отменить судебный приказ"
blurb: "Мировой суд вынес приказ о взыскании долга без вашего участия — есть 10 дней, чтобы его отменить."
examples: "Взыскание банком, МФО, коллектором, ЖКХ, налоговой; отмена через возражение"
document_type: vozrazhenie
template_file: null

header_fields:
  - label: "Мировому судье"
    field: court_name
  - label: "От должника:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по гражданскому процессу. Составь возражение на судебный приказ для подачи мировому судье.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
