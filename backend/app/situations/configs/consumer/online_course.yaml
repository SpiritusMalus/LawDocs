id: online_course
category: consumer
title: "Онлайн-школа не возвращает деньги"
blurb: "Заплатили за онлайн-курс, он не подошёл или вы передумали — школа отказывает в возврате."
examples: "Отказ вернуть за курс до начала обучения, удержание сверх фактических занятий, курс не соответствует описанию"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: school_name
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из problem_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–4 предложения) опиши ситуацию с онлайн-курсом
  официально-деловым стилем: что произошло, на каком этапе подаётся претензия,
  что ответила школа на запрос о возврате (если обращались). Исправь ошибки.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc

wizard_steps:
  - title: "Школа и курс"
    fields:
      - id: school_name
        type: text
        label: "Название онлайн-школы"
        placeholder: "Skillbox, Нетология, GeekBrains, Яндекс Практикум…"
        required: true
      - id: course_name
        type: text
        label: "Название курса"
        placeholder: "Веб-дизайн с нуля"
        required: true
      - id: contract_date
        type: date
        label: "Дата оплаты / заключения договора"
      - id: course_price
        type: number
        label: "Стоимость курса, ₽"
        placeholder: "90000"
        required: true
  - title: "Что случилось"
    fields:
      - id: problem_type
        type: radio
        label: "Ситуация"
        required: true
        options:
          - value: not_started
            label: "Обучение ещё не началось"
          - value: partial
            label: "Прошёл часть курса, хочу вернуть за оставшееся"
          - value: quality
            label: "Курс не соответствует описанию / плохое качество"
          - value: other
            label: "Другое"
      - id: refund_request_date
        type: date
        label: "Когда обратились в школу с запросом на возврат"
        hint: "С этой даты считается неустойка 3%/день при просрочке"
      - id: claimed_amount
        type: number
        label: "Сумма к возврату, ₽"
        placeholder: "60000"
        hint: "Оставьте пустым, если хотите вернуть полную стоимость курса"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что произошло, что ответила школа на ваш запрос о возврате"
        required: true

legal_refs:
  - law: "ФЗ №273-ФЗ «Об образовании в РФ» ст. 54 — договор об образовании"
    url: "https://www.consultant.ru/document/cons_doc_LAW_140174/"
  - law: "ПП РФ №1441 — Правила оказания платных образовательных услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_362652/"
  - law: "ЗоЗПП ст. 28, 32 — отказ от услуги, нарушение срока возврата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"

legal_refs_by_branch:
  problem_type:not_started:
    - law: "ЗоЗПП ст. 32 — право отказаться от услуги до её начала с возвратом полной суммы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
    - law: "ГК РФ ст. 782 ч. 2 — отказ исполнителя от договора с возмещением убытков"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  problem_type:partial:
    - law: "ЗоЗПП ст. 32 — право отказаться от услуги с оплатой фактически оказанной части"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
    - law: "ПП РФ №1441 п. 11 — при одностороннем отказе возвращается разница за неоказанную часть"
      url: "https://www.consultant.ru/document/cons_doc_LAW_362652/"
  problem_type:quality:
    - law: "ЗоЗПП ст. 29 ч. 1 — права потребителя при ненадлежащем качестве услуги"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
    - law: "ФЗ №273-ФЗ ст. 54 ч. 2 — договор об образовании должен содержать условия об ответственности"
      url: "https://www.consultant.ru/document/cons_doc_LAW_140174/"
  problem_type:other:
    - law: "ПП РФ №1441 — Правила оказания платных образовательных услуг"
      url: "https://www.consultant.ru/document/cons_doc_LAW_362652/"
