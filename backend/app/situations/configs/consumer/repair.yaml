id: repair
category: consumer
title: "Подрядчик плохо сделал ремонт"
blurb: "Наняли мастера или компанию — работа выполнена с дефектами, переделывать отказываются."
examples: "Кривая плитка, отвалилась штукатурка, потекла сантехника после замены, недоделанные работы"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по защите прав потребителей в сфере услуг. Составь претензию подрядчику (строительной компании или частному мастеру) за ненадлежащее качество ремонтных работ.

  Структура документа:
  1. Шапка: «[contractor_name], [contractor_address]» / «От: [full_name], [contact_address], [phone], [email]»
  2. Заголовок: ПРЕТЕНЗИЯ о ненадлежащем качестве выполненных работ
  3. Описание договора:
     — дата заключения договора (contract_date)
     — если указан contract_number — ссылка «по договору подряда № contract_number»
     — вид работ (work_type)
     — стоимость work_price руб.
     — дата сдачи работ (work_end_date)
  4. Описание выявленных недостатков (defect_desc): конкретно и детально.
     Дата обнаружения (defect_discovery_date).
  5. Если contractor_response заполнен — указать, что подрядчик был уведомлён, и его позицию.
  6. Правовое обоснование:
     — ЗоЗПП ст. 29: потребитель вправе потребовать безвозмездного устранения недостатков,
       соразмерного снижения цены, возмещения расходов на исправление дефектов третьими лицами
       или расторжения договора с возвратом денег
     — ЗоЗПП ст. 30: подрядчик обязан устранить недостатки в разумный срок (не более 45 дней)
     — ЗоЗПП ст. 28 ч. 5: неустойка 3% от стоимости работ за каждый день просрочки
     — ГК РФ ст. 723: подрядчик несёт ответственность за качество работы
     — ГК РФ ст. 724: гарантийный срок
  7. Если demand = refund — дополнительно: ст. 29 ч. 3 ЗоЗПП, право расторгнуть договор при существенных недостатках.
  8. Расчёт неустойки (только если contractor_response указывает на отказ устранять и defect_discovery_date задана):
     work_price × 3% × количество_дней_с_даты_обнаружения_до_даты_составления. Ограничить суммой work_price.
  9. Требование: конкретное (согласно demand), срок исполнения 10 дней (ст. 31 ЗоЗПП).
  10. Предупреждение: при отказе — иск в суд + штраф 50% (ст. 13 ЗоЗПП) + моральный вред.
  11. Дата и подпись

ai_narrative_prompt: |
  Опиши на юридическом языке: вид выполненных работ, дату их сдачи, выявленные дефекты и когда они обнаружены.
  Если подрядчик уже получил претензию и отказал — упомяни это.
  Используй только данные из формы.

wizard_steps:
  - title: "Подрядчик и договор"
    fields:
      - id: contractor_name
        type: text
        label: "Название компании или ФИО мастера"
        placeholder: "ООО «СтройМастер» или Иванов А.В."
        required: true
      - id: contractor_address
        type: text
        label: "Адрес или сайт подрядчика"
        placeholder: "г. Москва, ул. Строителей, 10 или stroymaster.ru"
      - id: contract_date
        type: date
        label: "Дата заключения договора"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора (если есть)"
        placeholder: "№ 25/2025"
      - id: work_type
        type: text
        label: "Вид выполненных работ"
        placeholder: "Укладка плитки в ванной, покраска стен, замена сантехники…"
        required: true
      - id: work_price
        type: number
        label: "Стоимость работ по договору, ₽"
        placeholder: "180000"
        required: true
      - id: work_end_date
        type: date
        label: "Дата сдачи работ"
        required: true
  - title: "В чём проблема"
    fields:
      - id: defect_desc
        type: textarea
        label: "Опишите недостатки"
        placeholder: "Плитка уложена с перепадами уровня, швы неровные, откололась в двух местах через неделю…"
        required: true
      - id: defect_discovery_date
        type: date
        label: "Когда обнаружены недостатки"
        required: true
      - id: contractor_response
        type: textarea
        label: "Реакция подрядчика"
        placeholder: "Отказался переделывать, сослался на усадку здания / не отвечает на звонки…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: fix
            label: "Устранить дефекты бесплатно"
          - value: discount
            label: "Снизить цену (соразмерно дефектам)"
          - value: third_party
            label: "Возместить расходы на устранение другим подрядчиком"
          - value: refund
            label: "Расторгнуть договор и вернуть деньги"

legal_refs:
  - law: "Закон о защите прав потребителей ст. 29 — права при недостатках услуги"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 723 — ответственность подрядчика за ненадлежащее качество"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
