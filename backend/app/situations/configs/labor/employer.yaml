id: employer
category: labor
title: "Работодатель не выплатил"
blurb: "Не выдают зарплату, расчёт при увольнении, компенсацию за отпуск."
examples: "Задержка зарплаты, недоплата, серая часть, расчёт при увольнении"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по трудовому праву. Составь претензию работодателю о выплате задолженности.

  Шапка: «Руководителю [company_name], [company_inn]» / «От: [full_name], [position], [contact_address], [phone], [email]»
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после. (о выплате задержанной заработной платы / расчёта)
  Описание: должность (position), период работы (hire_date если есть), за какой период не выплачено (debt_period), сумма долга (debt_amount)
  Если указан last_payment_date — рассчитай количество дней задержки от этой даты до даты составления документа и подставь в расчёт.
  Правовое обоснование: ТК РФ ст. 136 (сроки выплаты), ст. 140 (расчёт при увольнении), ст. 236 (компенсация 1/150 ключевой ставки ЦБ), ст. 142 (право приостановить работу)
  Расчёт компенсации: [calculated_compensation_section] (если секция пуста — пункт 6 не включай)
  Если указаны additional_desc — добавь абзац «Дополнительные обстоятельства» с этой информацией.
  Требование: выплатить долг + компенсацию в течение 3 рабочих дней
  При неисполнении — обращение в ГИТ (онлайнинспекция.рф) и прокуратуру, иск в суд

ai_narrative_prompt: |
  Опиши на юридическом языке: должность, период работы, сумму долга и сколько дней просрочки.
  Если есть дополнительные обстоятельства — включи их.
  Используй только данные из формы.

wizard_steps:
  - title: "Работодатель"
    fields:
      - id: company_name
        type: text
        label: "Название организации"
        placeholder: "ООО «Ромашка»"
        required: true
      - id: company_inn
        type: text
        label: "ИНН работодателя (если знаете)"
        placeholder: "7712345678"
      - id: director_name
        type: text
        label: "ФИО директора (если знаете)"
        placeholder: "Петров Пётр Петрович"
      - id: company_address
        type: text
        label: "Адрес организации"
        placeholder: "г. Москва, ул. Ленина, 1"
  - title: "Трудовые отношения"
    fields:
      - id: position
        type: text
        label: "Ваша должность"
        placeholder: "Менеджер по продажам"
        required: true
      - id: hire_date
        type: date
        label: "Дата приёма на работу"
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: salary_delay
            label: "Задержка зарплаты"
          - value: underpayment
            label: "Недоплата / неполный расчёт"
          - value: dismissal
            label: "Незаконное увольнение"
          - value: vacation
            label: "Не выплатили отпускные / компенсацию"
          - value: other
            label: "Другое"
      - id: debt_amount
        type: number
        label: "Сумма долга, ₽"
        placeholder: "75000"
        required: true
      - id: debt_period
        type: text
        label: "За какой период"
        placeholder: "Январь–март 2025"
      - id: last_payment_date
        type: date
        label: "Дата последней выплаты"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: pay_debt
            label: "Выплатить долг и компенсацию"
          - value: reinstate
            label: "Восстановить на работе"
          - value: other
            label: "Другое"
      - id: additional_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Что важно учесть при составлении претензии"

legal_refs:
  - law: "Трудовой кодекс РФ (ст. 136, 140, 236)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_34683/"
