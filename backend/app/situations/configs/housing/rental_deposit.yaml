id: rental_deposit
category: housing
title: "Арендодатель не возвращает залог"
blurb: "Сняли квартиру, внесли залог — после выезда хозяин отказывается его вернуть."
examples: "Незаконное удержание залога, надуманный ущерб, ссылка на обычный износ"
document_type: pretenziya
template_file: null

header_fields:
  - field: landlord_name
  - field: landlord_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по жилищному праву. Составь претензию арендодателю о возврате обеспечительного платежа (залога).
     [landlord_name]
     [landlord_address]
     От: [full_name]
     [contact_address]
     [phone], [email]
  ВТОРОЕ — заголовок ПРЕТЕНЗИЯ: одним словом, заглавными, отдельной строкой, без пояснений после.
  Описание: адрес квартиры (apartment_address), период аренды (move_in_date — move_out_date), сумма залога (deposit_amount руб.). Если указан contract_number — ссылка на договор аренды №contract_number.
  Правовое обоснование:
     — ГК РФ ст. 381.1: обеспечительный платёж подлежит возврату, если предусмотренные договором обстоятельства не наступили или договор прекращён
     — ГК РФ ст. 622: после прекращения договора аренды арендатор обязан вернуть имущество; все иные обязательства сторон, в том числе по возврату обеспечительного платежа, также прекращаются
     — ГК РФ ст. 1102: лицо, без законных оснований удерживающее чужие денежные средства, обязано их вернуть (неосновательное обогащение)
     — ГК РФ ст. 395: за незаконное удержание денежных средств начисляются проценты по ключевой ставке Банка России
  Если deposit_reason = damages_fake или wear_normal: добавить абзац, что нормальный износ квартиры в результате её использования по назначению (амортизация) не является ущербом, за который арендатор несёт ответственность (ГК РФ ст. 616, 622). Арендодатель обязан документально подтвердить реальный ущерб, причинённый сверх нормального износа.
  Описание ситуации из problem_desc
  Требование: вернуть залог в размере deposit_amount руб. в течение 10 дней с даты получения настоящей претензии
  При неисполнении — иск в суд; взыскание суммы залога, процентов за пользование чужими деньгами (ст. 395 ГК РФ), морального вреда, судебных расходов
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
ai_narrative_prompt: |
  Опиши на юридическом языке: адрес квартиры, период аренды, сумму внесённого залога.
  Укажи, что договор аренды прекращён, арендатор освободил жилое помещение и передал его арендодателю, однако залог не возвращён.
  Если указана причина удержания — опровергни её правовыми аргументами.
  Используй только данные из формы.

wizard_steps:
  - title: "Арендодатель и квартира"
    fields:
      - id: landlord_name
        type: text
        label: "ФИО арендодателя (хозяина)"
        placeholder: "Петров Пётр Петрович"
        required: true
      - id: landlord_address
        type: text
        label: "Адрес арендодателя для направления претензии"
        placeholder: "г. Москва, ул. Ленина, д. 1, кв. 2"
        hint: "Если не знаете — укажите адрес сданной квартиры"
      - id: apartment_address
        type: text
        label: "Адрес арендованной квартиры"
        placeholder: "г. Москва, ул. Пушкина, д. 10, кв. 5"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора аренды (если есть)"
        placeholder: "№ 12/2024"
  - title: "Период аренды и залог"
    fields:
      - id: move_in_date
        type: date
        label: "Дата въезда (начало аренды)"
        required: true
      - id: move_out_date
        type: date
        label: "Дата выезда (конец аренды)"
        required: true
      - id: deposit_amount
        type: number
        label: "Сумма залога, ₽"
        placeholder: "50000"
        required: true
      - id: deposit_reason
        type: radio
        label: "Почему арендодатель не возвращает залог"
        required: true
        options:
          - value: no_reason
            label: "Молчит, не объясняет причину"
          - value: damages_fake
            label: "Придумал ущерб, которого нет"
          - value: wear_normal
            label: "Ссылается на обычный износ квартиры"
          - value: debt_claimed
            label: "Говорит о задолженности по ЖКХ или аренде"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что говорит арендодатель, в каком состоянии была сдана квартира при выезде"
        required: true

legal_refs:
  - law: "ГК РФ ст. 381.1 — обеспечительный платёж"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 622 — возврат имущества при прекращении аренды"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 1102 — неосновательное обогащение"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
