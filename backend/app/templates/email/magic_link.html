<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в LawDocs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #f1f5f9 100%);
            padding: 40px 20px;
            line-height: 1.6;
            color: #2c3e50;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 32px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
        }
        
        .content {
            padding: 32px 24px;
        }
        
        .greeting {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .info-block {
            background: #f0f4f8;
            border-left: 4px solid #2563eb;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #475569;
        }
        
        .info-block strong {
            color: #1e293b;
            display: block;
            margin-bottom: 6px;
        }
        
        .cta-button {
            display: inline-block;
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            margin-bottom: 24px;
            border: none;
            cursor: pointer;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }
        
        .footer-note {
            font-size: 12px;
            color: #7f8fa3;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer-note a {
            color: #2563eb;
            text-decoration: none;
        }
        
        .timer {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LawDocs</h1>
            <p>Вход в личный кабинет</p>
        </div>
        
        <div class="content">
            <p class="greeting">Привет! 👋</p>
            
            <div class="info-block">
                <strong>Доступ к личному кабинету</strong>
                Ссылка для входа действует {{ expire_minutes }} минут. Нажмите кнопку ниже, чтобы начать работу.
            </div>
            
            <a href="{{ url }}" class="cta-button">Войти в LawDocs</a>
            
            <p class="footer-note">
                Если вы не запрашивали вход — просто проигнорируйте это письмо. Ваша учётная запись в безопасности.
            </p>
        </div>
    </div>
</body>
</html>
