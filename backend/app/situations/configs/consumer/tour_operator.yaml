id: tour_operator
category: consumer
title: "Туроператор не вернул деньги за тур"
blurb: "Туроператор или агентство отменили тур, изменили условия или не возвращают предоплату."
examples: "Отмена тура, существенное изменение гостиницы или дат, отказ в возврате денег"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: tour_operator
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из problem_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–4 предложения) опиши ситуацию с туром
  официально-деловым стилем: что произошло (отмена, изменение условий, отказ в возврате),
  что говорит туроператор или агентство. Исправь ошибки. Сохрани все факты.
  Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc

wizard_steps:
  - title: "Туроператор и тур"
    fields:
      - id: tour_operator
        type: text
        label: "Название туроператора"
        placeholder: "TUI, Coral Travel, Pegas Touristik…"
        required: true
      - id: agency_name
        type: text
        label: "Турагентство (если покупали через посредника)"
        placeholder: "Агентство «Путешествие мечты»"
      - id: trip_destination
        type: text
        label: "Направление / страна"
        placeholder: "Турция, Анталья"
        required: true
      - id: departure_date
        type: date
        label: "Дата вылета по договору"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора (если есть)"
        placeholder: "ТУР-2025/456"
  - title: "Стоимость и ситуация"
    fields:
      - id: tour_price
        type: number
        label: "Стоимость тура, ₽"
        placeholder: "120000"
        required: true
      - id: refunded_amount
        type: number
        label: "Уже вернули, ₽ (0 — если ничего)"
        placeholder: "0"
        hint: "Введите 0, если деньги ещё не возвращали"
      - id: violation_type
        type: radio
        label: "Что произошло"
        required: true
        options:
          - value: operator_cancelled
            label: "Туроператор отменил тур"
          - value: changed_conditions
            label: "Существенно изменили условия (гостиница, сроки, маршрут)"
          - value: refund_denied
            label: "Отказываются возвращать деньги"
          - value: voluntary_refusal
            label: "Я сам отказался от тура"
          - value: other
            label: "Другое"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что именно произошло, что говорит туроператор или агентство"
        required: true

legal_refs:
  - law: "ФЗ-132 ст. 10, 10.1 — права туриста и обязанности туроператора"
    url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
  - law: "ФЗ-132 ст. 14 — полный возврат при угрозе безопасности туриста (форс-мажор)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
  - law: "ЗоЗПП ст. 28, 32 — отказ от услуги, нарушение срока возврата"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 782 — отказ от договора возмездного оказания услуг"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"

legal_refs_by_branch:
  violation_type:operator_cancelled:
    - law: "ФЗ-132 ст. 10 — обязанность туроператора возвратить стоимость тура при отмене"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
    - law: "ФЗ-132 ст. 14 — полный возврат без штрафов при существенном изменении условий"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
  violation_type:changed_conditions:
    - law: "ФЗ-132 ст. 10 ч. 5 — изменение существенных условий даёт право отказаться от тура"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
    - law: "ГК РФ ст. 450 — расторжение договора при существенном изменении обстоятельств"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  violation_type:refund_denied:
    - law: "ФЗ-132 ст. 10.1 — порядок урегулирования претензий туриста"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
    - law: "ЗоЗПП ст. 31 — срок удовлетворения требований потребителя (10 дней)"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  violation_type:voluntary_refusal:
    - law: "ФЗ-132 ст. 10 ч. 3 — право туриста отказаться с возмещением фактических расходов"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
    - law: "ЗоЗПП ст. 32 — право отказаться с оплатой фактически понесённых расходов"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  violation_type:other:
    - law: "ФЗ-132 ст. 17.4 — ответственность туроператора перед туристом"
      url: "https://www.consultant.ru/document/cons_doc_LAW_12462/"
