id: bank
category: banking
title: "Банк списал лишнее"
blurb: "Незаконные комиссии, навязанная страховка, блокировка счёта по 115-ФЗ."
examples: "Возврат страховки за период охлаждения, разблокировка, перерасчёт"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: bank_name
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_demand_section]

narrative_fields:
  - problem_desc

narrative_prompt: |
  Опиши на юридическом языке: что произошло, какую сумму незаконно взял банк и почему это нарушение закона.
  Используй только данные из формы.

wizard_steps:
  - title: "Банк и ситуация"
    fields:
      - id: bank_name
        type: text
        label: "Название банка"
        placeholder: "Сбербанк, ВТБ, Тинькофф…"
        required: true
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: insurance
            label: "Навязали страховку к кредиту"
          - value: block
            label: "Заблокировали счёт или карту по 115-ФЗ"
          - value: commission
            label: "Незаконная комиссия или списание"
          - value: other
            label: "Другое"
      - id: contract_number
        type: text
        label: "Номер договора или счёта"
        placeholder: "№ 12345678"
      - id: violation_date
        type: date
        label: "Дата события"
  - title: "Детали и сумма"
    fields:
      - id: amount
        type: number
        label: "Спорная сумма, ₽"
        placeholder: "45000"
        required: true
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что именно произошло, что говорит банк"
        required: true
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: return_insurance
            label: "Вернуть страховую премию"
          - value: unblock
            label: "Разблокировать счёт / карту"
          - value: return_commission
            label: "Вернуть незаконную комиссию"
          - value: other
            label: "Другое"

legal_refs:
  - law: "ФЗ «О потребительском кредите (займе)»"
    url: "https://www.consultant.ru/document/cons_doc_LAW_155986/"
  - law: "Закон о защите прав потребителей (ст. 16 — навязанные услуги)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ФЗ «О банках и банковской деятельности»"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5842/"

legal_refs_by_branch:
  violation_type:block:
    - law: "ФЗ №115-ФЗ «О противодействии легализации...» ст. 7 — основания блокировки счёта банком"
      url: "https://www.consultant.ru/document/cons_doc_LAW_32834/"
    - law: "ФЗ №115-ФЗ ст. 7.2 — порядок и сроки разблокировки"
      url: "https://www.consultant.ru/document/cons_doc_LAW_32834/"
  violation_type:insurance:
    - law: "ФЗ «О потребительском кредите» ст. 7 ч. 10 — запрет навязывать страховку как условие выдачи кредита"
      url: "https://www.consultant.ru/document/cons_doc_LAW_155986/"
