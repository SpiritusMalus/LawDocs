id: gibdd
category: transport
title: "Оспорить штраф ГИБДД"
blurb: "Вынесли постановление о штрафе, с которым вы не согласны — есть 10 дней на жалобу."
examples: "Камера зафиксировала чужое нарушение, за рулём был другой человек, ошибка в постановлении"
document_type: zhaloba
template_file: null

header_fields:
  - field: gibdd_unit
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по административному праву. Составь жалобу на постановление по делу об административном правонарушении (штраф ГИБДД).
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
