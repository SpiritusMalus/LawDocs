id: repair
category: consumer
title: "Подрядчик плохо сделал ремонт"
blurb: "Наняли мастера или компанию — работа выполнена с дефектами, переделывать отказываются."
examples: "Кривая плитка, отвалилась штукатурка, потекла сантехника после замены, недоделанные работы"
document_type: pretenziya
template_file: null

header_fields:
  - field: contractor_name
  - field: contractor_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из defect_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  ситуации официально-деловым стилем, исправь орфографические и грамматические ошибки.
  Не упоминай суммы компенсации и расчёт неустойки — они будут указаны отдельно.
  Не упоминай статьи законов — правовое обоснование подставляется отдельно.
  Сохрани все факты из текста. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - defect_desc

wizard_steps:
  - title: "Подрядчик и договор"
    fields:
      - id: contractor_name
        type: text
        label: "Название компании или ФИО мастера"
        placeholder: "ООО «СтройМастер» или Иванов А.В."
        required: true
      - id: contractor_address
        type: text
        label: "Адрес или сайт подрядчика"
        placeholder: "г. Москва, ул. Строителей, 10 или stroymaster.ru"
      - id: contract_date
        type: date
        label: "Дата заключения договора"
        required: true
      - id: contract_number
        type: text
        label: "Номер договора (если есть)"
        placeholder: "№ 25/2025"
      - id: work_type
        type: text
        label: "Вид выполненных работ"
        placeholder: "Укладка плитки в ванной, покраска стен, замена сантехники…"
        required: true
      - id: work_price
        type: number
        label: "Стоимость работ по договору, ₽"
        placeholder: "180000"
        required: true
      - id: work_end_date
        type: date
        label: "Дата сдачи работ"
        required: true
  - title: "В чём проблема"
    fields:
      - id: defect_desc
        type: textarea
        label: "Опишите недостатки"
        placeholder: "Плитка уложена с перепадами уровня, швы неровные, откололась в двух местах через неделю…"
        required: true
      - id: defect_discovery_date
        type: date
        label: "Когда обнаружены недостатки"
        required: true
      - id: contractor_response
        type: textarea
        label: "Реакция подрядчика"
        placeholder: "Отказался переделывать, сослался на усадку здания / не отвечает на звонки…"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: fix
            label: "Устранить дефекты бесплатно"
          - value: discount
            label: "Снизить цену (соразмерно дефектам)"
          - value: third_party
            label: "Возместить расходы на устранение другим подрядчиком"
          - value: refund
            label: "Расторгнуть договор и вернуть деньги"

legal_refs:
  - law: "ЗоЗПП ст. 29 — права потребителя при недостатках выполненной работы"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ЗоЗПП ст. 28 — неустойка 3% в день за нарушение срока выполнения работ"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ЗоЗПП ст. 30 — срок устранения недостатков работы (не более 20 дней)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 723 — ответственность подрядчика за ненадлежащее качество"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
  - law: "ГК РФ ст. 722, 724 — гарантийный срок и сроки предъявления требований по недостаткам"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
