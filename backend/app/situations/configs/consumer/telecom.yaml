id: telecom
category: consumer
title: "Интернет или телефон не работает"
blurb: "Провайдер не оказывает услуги по договору, списывает деньги незаконно или отключает без причины."
examples: "Скорость ниже заявленной, перебои в работе, незаконные списания, навязали платные опции"
document_type: pretenziya
template_file: null

header_fields:
  - field: provider_name
  - field: provider_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Ты — юрист по защите прав потребителей в сфере телекоммуникаций. Составь претензию оператору связи или интернет-провайдеру.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
