id: ddu_termination
category: housing
title: "Расторгнуть ДДУ и вернуть деньги"
blurb: "Хотите выйти из долевого строительства: застройщик затянул сроки или стройка стоит."
examples: "Просрочка более 2 месяцев, замороженная стройка, существенные недостатки"
document_type: uvedomlenie
template_file: null

header_fields:
  - field: developer_name
  - field: developer_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# system_prompt сохранён для документации структуры; в генерации используется python_template
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template, LLM только
  перефразирует нарратив клиента. system_prompt не участвует в генерации.
  Шапку и заголовок документа НЕ пиши — они формируются автоматически. Начинай сразу с первого абзаца тела.
  Верни только JSON: {"body": "текст тела документа"}
python_template: |
  Между мной, [full_name], и [developer_name] заключён договор участия в долевом строительстве №[contract_number] от [formatted_contract_date]. Объект долевого строительства: [apartment_address]. Цена договора составляет [contract_price] рублей, оплаченных мной [formatted_payment_date].

  На основании ч. 1 ст. 9 Федерального закона от 30.12.2004 № 214-ФЗ «Об участии в долевом строительстве многоквартирных домов и иных объектов недвижимости» настоящим уведомляю об одностороннем отказе от исполнения договора в связи с [termination_reason_text].

  {{llm_narrative}}

  В соответствии с ч. 2 ст. 9 Федерального закона № 214-ФЗ застройщик обязан в течение 20 рабочих дней возвратить цену договора и уплатить проценты за пользование денежными средствами в размере одной сто пятидесятой ставки рефинансирования Центрального банка Российской Федерации, действующей на день исполнения обязательства по возврату, за каждый день пользования.

  Цена договора составляет [contract_price] рублей. Проценты за пользование денежными средствами: [contract_price] руб. × [cb_rate]% / 100 / 150 × [calculated_days_used] дн. = [calculated_interest] руб. Итого к возврату: [calculated_total_return] рублей.

  Прошу перечислить [calculated_total_return] рублей на мои банковские реквизиты: [bank_details].

  Договор считается прекратившим действие со дня направления настоящего уведомления в силу ч. 4 ст. 9 Федерального закона № 214-ФЗ.

  В случае неисполнения настоящего требования в добровольном порядке оставляю за собой право обратиться в суд. Помимо суммы возврата и процентов будут взысканы: штраф в размере 50% от присуждённой суммы (п. 6 ст. 13 Закона РФ «О защите прав потребителей»), компенсация морального вреда, а также судебные расходы.

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства ситуации
  официально-деловым стилем, исправь орфографические и грамматические ошибки.
  Не упоминай суммы возврата и расчёт процентов — они будут указаны отдельно.
  Сохрани все факты из текста. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - problem_desc

wizard_steps:
  - title: "Застройщик"
    fields:
      - id: developer_name
        type: text
        label: "Наименование застройщика"
        placeholder: "ООО «СтройГрупп»"
        required: true
      - id: developer_address
        type: text
        label: "Юридический адрес застройщика"
        placeholder: "г. Москва, ул. Строителей, д. 1"
        hint: "Найдите в ДДУ или на сайте застройщика"
  - title: "Договор"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес квартиры (объекта ДДУ)"
        placeholder: "г. Москва, ул. Новая, д. 15, кв. 42"
        required: true
      - id: contract_number
        type: text
        label: "Номер ДДУ"
        placeholder: "№ 123/2022-ДДУ"
        required: true
      - id: contract_date
        type: date
        label: "Дата заключения ДДУ"
        required: true
      - id: contract_price
        type: number
        label: "Цена договора (ДДУ), ₽"
        placeholder: "5000000"
        required: true
      - id: payment_date
        type: date
        label: "Дата оплаты по ДДУ"
        required: true
        hint: "Дата, когда вы перечислили деньги застройщику"
  - title: "Основание расторжения"
    fields:
      - id: termination_reason
        type: radio
        label: "По какой причине вы расторгаете ДДУ"
        required: true
        options:
          - value: delay_2months
            label: "Застройщик задержал передачу более чем на 2 месяца"
          - value: defects_major
            label: "Существенные строительные недостатки"
          - value: construction_stopped
            label: "Строительство остановлено или заморожено"
          - value: other
            label: "Другое основание"
      - id: cb_rate
        type: number
        label: "Ключевая ставка ЦБ РФ, %"
        placeholder: "21"
        required: true
        hint: "На дату направления требования. Актуальную ставку смотрите на сайте cbr.ru"
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Дом должны были сдать в марте 2024, но строительство остановилось ещё в 2023"
        required: true

legal_refs:
  - law: "ФЗ-214 ст. 9 — расторжение ДДУ дольщиком в одностороннем порядке"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/ec477af1fa0c9ca283f1c6b7e9262650fdc94940/"
  - law: "ФЗ-214 ст. 6 — нарушение срока передачи как основание расторжения"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/817620cd3c49f19912fc1ac0f98b10d17f65b75b/"
  - law: "ФЗ-214 ст. 15.5 — возврат денежных средств с эскроу-счёта при расторжении"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/7e20edcc51ba599c70fb328204e3ac1226e7d912/"
  - law: "ЗоЗПП ст. 13 — штраф 50% за неисполнение в добровольном порядке"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/5311cc4c47a088e5ebc6a23b15f59fa70221f8ce/"

legal_refs_by_branch:
  termination_reason:delay_2months:
    - law: "ФЗ-214 ст. 6 ч. 2 — неустойка 1/300 ставки ЦБ за каждый день просрочки"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/817620cd3c49f19912fc1ac0f98b10d17f65b75b/"
    - law: "ФЗ-214 ст. 9 ч. 1 п. 1 — право расторгнуть при просрочке более 2 месяцев"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/ec477af1fa0c9ca283f1c6b7e9262650fdc94940/"
  termination_reason:defects_major:
    - law: "ФЗ-214 ст. 7 — гарантийные обязательства застройщика, устранение недостатков"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/aeb9f2327f835ecc02fb71b9a0312ead0b844204/"
    - law: "ФЗ-214 ст. 9 ч. 1 п. 2 — право расторгнуть при существенных недостатках"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/ec477af1fa0c9ca283f1c6b7e9262650fdc94940/"
  termination_reason:construction_stopped:
    - law: "ФЗ-214 ст. 9 ч. 1 п. 3 — право расторгнуть при приостановке/прекращении строительства"
      url: "https://www.consultant.ru/document/cons_doc_LAW_51038/ec477af1fa0c9ca283f1c6b7e9262650fdc94940/"
