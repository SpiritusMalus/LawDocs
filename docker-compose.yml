services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawdocs
      POSTGRES_PASSWORD: lawdocs_dev_pass
      POSTGRES_DB: lawdocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawdocs"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - lawdocs_documents:/var/lawdocs/documents
    # Запускает миграции и сервер
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file: ./frontend/.env.local
    environment:
      BACKEND_URL: http://backend:8000
      APP_ENV: development
    depends_on:
      - backend

  # pgAdmin — только для разработки/дебага, отключить в prod
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lawdocs.local
      PGADMIN_DEFAULT_PASSWORD: pgadmin_dev_pass
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  lawdocs_documents:
  pgadmin_data:
