id: bank
category: banking
title: "Банк списал лишнее"
blurb: "Незаконные комиссии, навязанная страховка, блокировка счёта по 115-ФЗ."
examples: "Возврат страховки за период охлаждения, разблокировка, перерасчёт"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по банковскому праву и защите прав потребителей. Составь претензию/заявление в банк.

  Шапка (правый верхний угол — каждый элемент с новой строки):
     «Руководителю [bank_name]»
     «От: [full_name]»
     «[contact_address]»
     «тел. [phone]»
     «[email]»
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после.
  Вводная часть: с [violation_date] по договору/счёту [contract_number] — что произошло (problem_desc). Пиши связным текстом, без меток «Номер договора:» или «Дата нарушения:».
  Правовое обоснование — включи ТОЛЬКО раздел, соответствующий violation_type, остальные не упоминай:
     - Если violation_type=insurance: ФЗ «О потребительском кредите» ст. 7, Указание ЦБ №3854-У (период охлаждения 30 дней), ЗоЗПП ст. 16
     - Если violation_type=block: ФЗ-115 ст. 7-8, право на уведомление об основаниях
     - Если violation_type=commission: ЗоЗПП ст. 16, ГК РФ ст. 168
  Конкретное требование с суммой (amount) и сроком (30 дней)
  При отказе — жалоба в ЦБ (cbr.ru) и Роспотребнадзор + иск в суд

ai_narrative_prompt: |
  Опиши на юридическом языке: что произошло, какую сумму незаконно взял банк и почему это нарушение закона.
  Используй только данные из формы.

wizard_steps:
  - title: "Банк и ситуация"
    fields:
      - id: bank_name
        type: text
        label: "Название банка"
        placeholder: "Сбербанк, ВТБ, Тинькофф…"
        required: true
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: insurance
            label: "Навязали страховку к кредиту"
          - value: block
            label: "Заблокировали счёт или карту по 115-ФЗ"
          - value: commission
            label: "Незаконная комиссия или списание"
          - value: other
            label: "Другое"
      - id: contract_number
        type: text
        label: "Номер договора или счёта"
        placeholder: "№ 12345678"
      - id: violation_date
        type: date
        label: "Дата события"
  - title: "Детали и сумма"
    fields:
      - id: amount
        type: number
        label: "Спорная сумма, ₽"
        placeholder: "45000"
        required: true
      - id: problem_desc
        type: textarea
        label: "Опишите ситуацию"
        placeholder: "Что именно произошло, что говорит банк"
        required: true
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: return_insurance
            label: "Вернуть страховую премию"
          - value: unblock
            label: "Разблокировать счёт / карту"
          - value: return_commission
            label: "Вернуть незаконную комиссию"
          - value: other
            label: "Другое"

legal_refs:
  - law: "ФЗ «О потребительском кредите (займе)»"
    url: "https://www.consultant.ru/document/cons_doc_LAW_155986/"
  - law: "Закон о защите прав потребителей (ст. 16 — навязанные услуги)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ФЗ «О банках и банковской деятельности»"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5842/"
