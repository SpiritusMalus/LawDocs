id: ddu_defects
category: housing
title: "Застройщик сдал квартиру с недостатками"
blurb: "Приняли квартиру, а потом обнаружили строительный брак: трещины, кривые стены, протечки."
examples: "Строительный брак, щели в окнах, промерзание стен, протечки, кривая стяжка"
document_type: pretenziya
template_file: null

system_prompt: |
  Ты — юрист по долевому строительству. Составь претензию застройщику об устранении строительных недостатков объекта долевого строительства.

  Шапка: «[developer_name], [developer_address]» / «От: [full_name], [contact_address], тел. [phone], [email]»
  После шапки напиши заголовок ПРЕТЕНЗИЯ — одним словом, заглавными, отдельной строкой, без пояснений после.
  Обстоятельства: между мной и застройщиком заключён ДДУ №contract_number; объект — квартира apartment_address; акт приёма-передачи подписан transfer_date.
  Правовое основание:
     — Ст. 7 ч. 1 Федерального закона № 214-ФЗ: застройщик обязан передать участнику долевого строительства объект, качество которого соответствует условиям договора и обязательным требованиям.
     — Ст. 7 ч. 2 ФЗ-214: в случае, если объект построен с отступлениями от условий договора, дольщик вправе потребовать безвозмездного устранения недостатков в разумный срок.
     — Гарантийный срок на объект составляет 5 лет (ст. 7 ч. 5 ФЗ-214).
     — Ст. 29 Закона РФ «О защите прав потребителей»: потребитель вправе потребовать устранения недостатков безвозмездно.
  Перечень выявленных недостатков (перечисли каждый пункт отдельно в виде нумерованного списка): defects_desc
  Если defects_amount указан: по предварительной оценке, стоимость устранения недостатков составляет defects_amount руб.
  Если problem_desc указан — включи дополнительные обстоятельства в текст предыдущего или отдельного абзаца без метки раздела.
  Требование: устранить все перечисленные недостатки в срок elimination_period календарных дней с даты получения настоящей претензии.
  При неудовлетворении — обращение в суд с требованием: безвозмездного устранения недостатков или возмещения расходов на их устранение, неустойки 1% от цены договора за каждый день просрочки, компенсации морального вреда, штрафа 50%.

ai_narrative_prompt: |
  Опиши на юридическом языке: реквизиты ДДУ, адрес квартиры, дату подписания акта.
  Укажи, что при эксплуатации квартиры были выявлены строительные недостатки.
  Используй только данные из формы.

wizard_steps:
  - title: "Застройщик"
    fields:
      - id: developer_name
        type: text
        label: "Наименование застройщика"
        placeholder: "ООО «СтройГрупп»"
        required: true
      - id: developer_address
        type: text
        label: "Юридический адрес застройщика"
        placeholder: "г. Москва, ул. Строителей, д. 1"
        hint: "Найдите в ДДУ или на сайте застройщика"
  - title: "Договор и квартира"
    fields:
      - id: apartment_address
        type: text
        label: "Адрес квартиры"
        placeholder: "г. Москва, ул. Новая, д. 15, кв. 42"
        required: true
      - id: contract_number
        type: text
        label: "Номер ДДУ"
        placeholder: "№ 123/2022-ДДУ"
        required: true
      - id: transfer_date
        type: date
        label: "Дата подписания акта приёма-передачи"
        required: true
        hint: "Дата, когда вы получили ключи и подписали акт"
  - title: "Недостатки"
    fields:
      - id: defects_desc
        type: textarea
        label: "Перечислите все строительные недостатки"
        placeholder: "1. Трещины на стенах в комнате\n2. Промерзает угол на кухне\n3. Окна пропускают воздух"
        required: true
        hint: "Чем подробнее — тем сильнее претензия. Перечислите каждый недостаток отдельно"
      - id: defects_amount
        type: number
        label: "Оценочная стоимость устранения, ₽"
        placeholder: "150000"
        hint: "Если есть смета или заключение эксперта — укажите сумму"
      - id: elimination_period
        type: radio
        label: "Требуемый срок устранения недостатков"
        required: true
        options:
          - value: "15"
            label: "15 дней"
          - value: "30"
            label: "30 дней"
          - value: "45"
            label: "45 дней"
      - id: problem_desc
        type: textarea
        label: "Дополнительные обстоятельства"
        placeholder: "Застройщик уже приходил, смотрел, но ничего не сделал"

legal_refs:
  - law: "ФЗ-214 ст. 7 — гарантийные обязательства застройщика (5 лет)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51038/"
  - law: "ЗоЗПП ст. 29 — права потребителя при недостатках"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"
  - law: "ГК РФ ст. 723 — последствия ненадлежащего качества работы"
    url: "https://www.consultant.ru/document/cons_doc_LAW_5142/"
