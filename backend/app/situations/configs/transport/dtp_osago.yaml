id: dtp_osago
category: transport
title: "Страховая не платит по ОСАГО"
blurb: "После ДТП страховая затягивает выплату или занизила сумму возмещения."
examples: "Просрочка выплаты по ОСАГО, занижение ущерба, отказ в выплате"
document_type: pretenziya
template_file: null

header_fields:
  - field: insurance_company
  - field: insurance_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# все секции рендерит calculate_dtp_osago (нет narrative_fields — 0 LLM-вызовов).
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_fields: []

wizard_steps:
  - title: "Страховая компания"
    fields:
      - id: insurance_company
        type: text
        label: "Название страховой компании"
        placeholder: "СОГАЗ, Росгосстрах, Альфастрахование…"
        required: true
      - id: insurance_address
        type: text
        label: "Адрес страховой (отделение или юридический)"
        placeholder: "г. Москва, ул. Садовая, д. 5"
      - id: policy_number
        type: text
        label: "Номер полиса ОСАГО виновника"
        placeholder: "ААА 1234567890"
        hint: "Указан в справке о ДТП или европротоколе"
  - title: "ДТП и ущерб"
    fields:
      - id: incident_date
        type: date
        label: "Дата ДТП"
        required: true
      - id: incident_location
        type: text
        label: "Место ДТП"
        placeholder: "г. Москва, ул. Ленина, д. 10"
        required: true
      - id: car_model
        type: text
        label: "Ваш автомобиль (марка, модель)"
        placeholder: "Toyota Camry 2020"
        required: true
      - id: car_plate
        type: text
        label: "Гос. номер вашего ТС"
        placeholder: "А123ВС 77"
      - id: damage_amount
        type: number
        label: "Размер ущерба по экспертизе / заявленный, ₽"
        placeholder: "150000"
        required: true
        hint: "Укажите сумму из заключения независимого оценщика или вашу оценку"
  - title: "Что сделала страховая"
    fields:
      - id: claim_date
        type: date
        label: "Дата подачи документов в страховую"
        required: true
        hint: "20 рабочих дней от этой даты — крайний срок выплаты"
      - id: violation_type
        type: radio
        label: "Нарушение страховой"
        required: true
        options:
          - value: delay
            label: "Выплату задержали (нет денег или затягивают)"
          - value: underestimate
            label: "Заплатили меньше реального ущерба"
          - value: refusal
            label: "Отказали в выплате"
      - id: paid_amount
        type: number
        label: "Сколько уже выплатили, ₽"
        placeholder: "0"
        hint: "Если не платили вообще — оставьте 0"
      - id: refusal_reason
        type: textarea
        label: "Основание отказа (если отказали)"
        placeholder: "Страховая сослалась на…"

legal_refs:
  - law: "ФЗ-40 «Об ОСАГО» ст. 12, 16.1"
    url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
  - law: "ФЗ-123 «О финансовом уполномоченном» — обязателен до суда"
    url: "https://www.consultant.ru/document/cons_doc_LAW_299392/"
  - law: "ЗоЗПП ст. 13 — штраф 50%"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/"

legal_refs_by_branch:
  violation_type:delay:
    - law: "ФЗ-40 «Об ОСАГО» ст. 12 ч. 21 — неустойка 1% от суммы за каждый день просрочки выплаты"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
  violation_type:underestimate:
    - law: "ФЗ-40 «Об ОСАГО» ст. 12 ч. 13 — независимая экспертиза для определения размера ущерба"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
    - law: "Положение ЦБ РФ №432-П — единая методика расчёта ущерба по ОСАГО"
      url: "https://www.consultant.ru/document/cons_doc_LAW_172971/"
  violation_type:refusal:
    - law: "ФЗ-40 «Об ОСАГО» ст. 16.1 — досудебный порядок урегулирования споров"
      url: "https://www.consultant.ru/document/cons_doc_LAW_36528/"
    - law: "ФЗ-123 «О финансовом уполномоченном» ст. 15 — обращение к финомбудсмену при отказе"
      url: "https://www.consultant.ru/document/cons_doc_LAW_299392/"
