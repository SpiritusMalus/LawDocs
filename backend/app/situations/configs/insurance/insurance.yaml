    url: "https://www.consultant.ru/document/cons_doc_LAW_9027/147e3d1901cf980fa4c40b4d27fbdeb70de1cf80/"
  - law: "ФЗ №4015-1 «Об организации страхового дела» ст. 10 — страховая выплата"
    url: "https://normativ.kontur.ru/document?moduleId=1&documentId=501883#h1277"
  - law: "ФЗ-123 «О финансовом уполномоченном» — обязательный досудебный порядок (до 500 000 ₽)"
    url: "https://normativ.kontur.ru/document?moduleId=1&documentId=503727#h80"
  - law: "ЗоЗПП ст. 13 — штраф 50% за отказ исполнить требование добровольно"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/5311cc4c47a088e5ebc6a23b15f59fa70221f8ce/"
  - law: "ФЗ «Об ОСАГО» ст. 12, 16.1 — применяется при спорах по ОСАГО"
    url: "https://www.consultant.ru/document/cons_doc_LAW_36528/60bee7e4ad3be3f0b98febf9dd92c0b78e0525d5/"

