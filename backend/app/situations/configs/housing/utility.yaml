id: utility
category: housing
title: "Управляющая компания / ЖКХ"
blurb: "Лишние начисления, перерасчёт, невыполнение обязательств."
examples: "Перерасчёт за некачественные услуги, оспаривание долга, протечки"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: company_name
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_demand_section]

narrative_fields:
  - problem_desc

narrative_prompt: |
  Опиши на юридическом языке: характер нарушения УК, период, сумму переплаты или описание дефекта.
  Используй только данные из формы.

wizard_steps:
  - title: "УК / ТСЖ и адрес"
    fields:
      - id: company_name
        type: text
        label: "Название УК или ТСЖ"
        placeholder: "ООО «УК Комфорт»"
        required: true
      - id: company_address
        type: text
        label: "Адрес УК (офис, если знаете)"
        placeholder: "г. Москва, ул. Ленина, 2"
      - id: apartment_address
        type: text
        label: "Адрес вашей квартиры"
        placeholder: "г. Москва, ул. Пушкина, д. 10, кв. 5"
        required: true
  - title: "Что случилось"
    fields:
      - id: violation_type
        type: radio
        label: "Тип нарушения"
        required: true
        options:
          - value: overcharge
            label: "Лишние начисления / завышенные тарифы"
          - value: poor_service
            label: "Некачественные коммунальные услуги"
          - value: no_repair
            label: "Отказывают делать ремонт общего имущества"
          - value: other
            label: "Другое"
      - id: violation_period
        type: text
        label: "Период нарушения"
        placeholder: "Январь–март 2025"
      - id: problem_desc
        type: textarea
        label: "Опишите проблему"
        placeholder: "Что именно происходит, сколько раз обращались"
        required: true
      - id: disputed_amount
        type: number
        label: "Сумма к перерасчёту, ₽ (если известна)"
        placeholder: "3200"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: recalculate
            label: "Произвести перерасчёт"
          - value: fix
            label: "Устранить нарушения"
          - value: both
            label: "И перерасчёт, и устранить нарушения"

legal_refs:
  - law: "ЖК РФ ст. 161 — требования к управляющей компании"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
  - law: "ЖК РФ ст. 20 — государственный жилищный надзор (ГЖИ)"
    url: "https://www.consultant.ru/document/cons_doc_LAW_51057/"
  - law: "ПП РФ №354 пп. 98–103 — перерасчёт платы за некачественные коммунальные услуги"
    url: "https://www.consultant.ru/document/cons_doc_LAW_123668/"
