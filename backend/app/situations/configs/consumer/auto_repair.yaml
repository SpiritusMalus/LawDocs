id: auto_repair
category: consumer
title: "Автосервис плохо отремонтировал"
blurb: "Автосервис выполнил ремонт некачественно или затянул сроки — требуем устранения или возврата денег."
examples: "Брак в ремонте, повторная поломка, нарушение сроков, завышенная стоимость"
document_type: pretenziya
template_file: null

header_fields:
  - label: "Руководителю"
    field: service_name
  - field: service_address
  - label: "От:"
    field: user_full_name
  - field: user_address
  - prefix: "тел. "
    field: user_phone
  - field: user_email

# Гибридный режим: структура документа рендерится через python_template,
# LLM перефразирует только {{llm_narrative}} из defect_desc.
# system_prompt сохранён для совместимости с обязательным полем модели,
# но в гибридном режиме не используется.
system_prompt: |
  Гибридный режим: структура документа рендерится через python_template,
  LLM перефразирует только {{llm_narrative}}.

python_template: |
  [calculated_intro_section]

  [calculated_violation_section]

  {{llm_narrative}}

  [calculated_legal_section]

  [calculated_amount_section]

  [calculated_demand_section]

narrative_prompt: |
  Ты — помощник юриста. Кратко (3–5 предложений) опиши фактические обстоятельства
  ситуации официально-деловым стилем, исправь орфографические и грамматические ошибки.
  Не упоминай суммы компенсации и расчёт неустойки — они будут указаны отдельно.
  Не упоминай статьи законов — правовое обоснование подставляется отдельно.
  Сохрани все факты из текста. Верни ТОЛЬКО текст абзаца, без вступлений и пояснений.

narrative_fields:
  - defect_desc

wizard_steps:
  - title: "Автосервис"
    fields:
      - id: service_name
        type: text
        label: "Название автосервиса"
        placeholder: "ООО «АвтоТехника», СТО «Мастер»"
        required: true
      - id: service_address
        type: text
        label: "Адрес автосервиса"
        placeholder: "г. Москва, ул. Гаражная, д. 5"
  - title: "Автомобиль и работы"
    fields:
      - id: car_model
        type: text
        label: "Марка и модель автомобиля"
        placeholder: "Kia Rio 2019"
        required: true
      - id: car_plate
        type: text
        label: "Гос. номер"
        placeholder: "В123АВ 77"
      - id: service_date
        type: date
        label: "Дата сдачи авто в ремонт"
        required: true
      - id: work_desc
        type: textarea
        label: "Какие работы заказали"
        placeholder: "Замена тормозных колодок, диагностика двигателя, замена масла"
        required: true
      - id: work_price
        type: number
        label: "Стоимость работ по квитанции, ₽"
        placeholder: "35000"
        required: true
  - title: "Нарушение"
    fields:
      - id: violation_type
        type: radio
        label: "В чём проблема"
        required: true
        options:
          - value: bad_quality
            label: "Ремонт выполнен некачественно (брак, повторная поломка)"
          - value: delay
            label: "Авто задержали сверх срока"
          - value: overcharge
            label: "Выставили счёт больше договорённого"
          - value: other
            label: "Другое"
      - id: defect_desc
        type: textarea
        label: "Опишите дефекты или проблему"
        placeholder: "После ремонта снова стучат тормоза, масло подтекает…"
        required: true
      - id: planned_date
        type: date
        label: "Когда должны были вернуть авто"
        hint: "Дата по договору или устной договорённости"
      - id: agreed_price
        type: number
        label: "Первоначально согласованная цена, ₽"
        hint: "Если цену завысили — укажите сумму из договора или сметы"
  - title: "Что вы хотите"
    fields:
      - id: demand
        type: radio
        label: "Ваше требование"
        required: true
        options:
          - value: fix
            label: "Устранить дефекты бесплатно"
          - value: refund
            label: "Вернуть деньги"
          - value: reduce_price
            label: "Снизить стоимость работ"
          - value: other
            label: "Другое"

legal_refs:
  - law: "ЗоЗПП ст. 29 — права при недостатках работы"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/41fd88c62c89ddba445ff85149b17a63b9679810/"
  - law: "ЗоЗПП ст. 28 — неустойка 3%/день за нарушение срока"
    url: "https://www.consultant.ru/document/cons_doc_LAW_305/f190d8f6c0d4f03af399cc0efcc722d87a0f83a6/"
  - law: "ГК РФ ст. 709, 722 — цена и гарантия по договору подряда"
    url: "https://www.consultant.ru/document/cons_doc_LAW_9027/7ac1b059cae570f48b3afe418c6ad41b54f166b1/"

legal_refs_by_branch:
  violation_type:bad_quality:
    - law: "ЗоЗПП ст. 29 ч. 1 — права потребителя при ненадлежащем качестве ремонта"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/41fd88c62c89ddba445ff85149b17a63b9679810/"
    - law: "ГК РФ ст. 723 — ответственность подрядчика за ненадлежащее качество работы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/0f3422f73df7bee03d56085359c80be8d2981ead/"
  violation_type:delay:
    - law: "ЗоЗПП ст. 28 ч. 5 — неустойка 3% от цены работы за каждый день просрочки"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/f190d8f6c0d4f03af399cc0efcc722d87a0f83a6/"
  violation_type:overcharge:
    - law: "ГК РФ ст. 709 ч. 5 — смета является обязательной, превышение требует согласия заказчика"
      url: "https://www.consultant.ru/document/cons_doc_LAW_9027/7ac1b059cae570f48b3afe418c6ad41b54f166b1/"
    - law: "ЗоЗПП ст. 33 — обязательность сметы и последствия её превышения"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/1536a01e6c5fdae25dce77f54eabf02f32e0c382/"
  violation_type:other:
    - law: "ЗоЗПП ст. 14 — имущественная ответственность за вред, причинённый вследствие недостатков"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/7424b85efed3a9eadfac221e437073b07acddd3e/"
  demand:fix:
    - law: "ЗоЗПП ст. 29 ч. 1 п. 1 — безвозмездное устранение недостатков"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/41fd88c62c89ddba445ff85149b17a63b9679810/"
  demand:refund:
    - law: "ЗоЗПП ст. 29 ч. 1 п. 4 — расторжение договора и полный возврат стоимости"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/41fd88c62c89ddba445ff85149b17a63b9679810/"
  demand:reduce_price:
    - law: "ЗоЗПП ст. 29 ч. 1 п. 2 — соразмерное уменьшение цены работы"
      url: "https://www.consultant.ru/document/cons_doc_LAW_305/41fd88c62c89ddba445ff85149b17a63b9679810/"
  demand:other:
    - law: "ГК РФ ст. 15 — возмещение убытков, включая упущенную выгоду"
      url: "https://www.consultant.ru/document/cons_doc_LAW_5142/4734407fbf4d5eec5306840f8b75b994e5d57090/"
